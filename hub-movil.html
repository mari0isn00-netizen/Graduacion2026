<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin — Graduación 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --dark: #06070f;
  --dark2: #0c0e1a;
  --cream: #f0e6cc;
  --cream2: #a09070;
  --green: #00c853;
  --red: #cc3333;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--dark); color: var(--cream); font-family: 'Share Tech Mono', monospace; min-height: 100%; }
body { padding-bottom: 32px; }

/* ─── PANTALLAS ─── */
.screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 28px 20px; }
.screen.active { display: flex; }

/* ══ PANTALLA LOGIN ══ */
#screen-login { justify-content: center; gap: 24px; text-align: center; }

.login-logo {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 42px;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(201,168,76,0.4);
  line-height: 1;
}
.login-sub {
  font-size: 10px;
  letter-spacing: 6px;
  color: rgba(201,168,76,0.35);
}
.login-sep {
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.3;
}

.pin-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 6px;
  color: var(--cream2);
}

.pin-dots {
  display: flex;
  gap: 16px;
  justify-content: center;
}
.pin-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.3);
  background: transparent;
  transition: all 0.2s;
}
.pin-dot.filled {
  background: var(--gold);
  border-color: var(--gold);
  box-shadow: 0 0 10px rgba(201,168,76,0.6);
}
.pin-dot.error {
  background: var(--red);
  border-color: var(--red);
  animation: shake 0.4s ease;
}
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  width: 100%;
  max-width: 280px;
}
.numpad-btn {
  background: rgba(201,168,76,0.05);
  border: 1px solid rgba(201,168,76,0.12);
  color: var(--cream);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  padding: 18px 0;
  cursor: pointer;
  transition: all 0.1s;
  border-radius: 2px;
  letter-spacing: 2px;
}
.numpad-btn:active { background: rgba(201,168,76,0.15); transform: scale(0.96); }
.numpad-btn.del { font-size: 20px; color: var(--cream2); }
.numpad-btn.ok { background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08)); border-color: rgba(201,168,76,0.3); color: var(--gold); }

/* ══ PANTALLA ADMIN ══ */
#screen-admin { gap: 0; padding: 20px 16px; }

.admin-header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(201,168,76,0.1);
}
.admin-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 6px;
  color: var(--gold);
}
.status-live {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--green);
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 1.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* Control principal */
.control-section {
  width: 100%;
  margin-bottom: 20px;
}
.section-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 10px;
  letter-spacing: 6px;
  color: rgba(201,168,76,0.3);
  margin-bottom: 10px;
}

.btn-control {
  width: 100%;
  background: rgba(201,168,76,0.05);
  border: 1px solid rgba(201,168,76,0.18);
  color: var(--cream);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 4px;
  padding: 16px 20px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
  transition: all 0.15s;
  border-radius: 2px;
}
.btn-control:active { background: rgba(201,168,76,0.12); transform: scale(0.98); }
.btn-control .btn-icon { font-size: 22px; flex-shrink: 0; }
.btn-control .btn-sub { font-size: 10px; letter-spacing: 2px; color: var(--cream2); font-family: 'Share Tech Mono', monospace; display: block; margin-top: 2px; }
.btn-control.primary { background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.06)); border-color: rgba(201,168,76,0.35); }
.btn-control.danger { border-color: rgba(204,51,51,0.3); }
.btn-control.danger:active { background: rgba(204,51,51,0.1); }

/* Juegos grid */
.juegos-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
}
.juego-btn {
  width: 100%;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(201,168,76,0.1);
  color: var(--cream);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 2px;
  padding: 13px 16px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.15s;
  border-radius: 2px;
}
.juego-btn:active { background: rgba(201,168,76,0.1); transform: scale(0.98); }
.juego-btn .j-emoji { font-size: 20px; flex-shrink: 0; }
.juego-btn .j-info { flex: 1; }
.juego-btn .j-nombre { display: block; }
.juego-btn .j-meta { display: block; font-size: 9px; letter-spacing: 2px; color: var(--cream2); font-family: 'Share Tech Mono', monospace; margin-top: 1px; }
.juego-btn .j-loc { font-size: 9px; letter-spacing: 1px; padding: 2px 6px; border: 1px solid rgba(201,168,76,0.15); color: rgba(201,168,76,0.4); flex-shrink: 0; }

/* Jugadores */
.jugadores-section {
  width: 100%;
  margin-bottom: 20px;
}
.jugadores-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(201,168,76,0.1);
  padding: 12px;
  min-height: 60px;
}
.jugador-chip {
  background: rgba(201,168,76,0.06);
  border: 1px solid rgba(201,168,76,0.18);
  padding: 4px 10px;
  font-size: 11px;
  color: rgba(201,168,76,0.8);
  display: flex;
  align-items: center;
  gap: 6px;
}
.jugador-chip .chip-del {
  width: 14px; height: 14px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(204,51,51,0.6);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
}

.add-jugador-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.input-nombre-admin {
  flex: 1;
  background: rgba(201,168,76,0.04);
  border: none;
  border-bottom: 1px solid rgba(201,168,76,0.25);
  color: var(--cream);
  font-family: 'Share Tech Mono', monospace;
  font-size: 15px;
  padding: 10px 12px;
  outline: none;
  letter-spacing: 1px;
}
.input-nombre-admin::placeholder { color: rgba(240,230,204,0.2); }
.btn-add {
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.25);
  color: var(--gold);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  padding: 0 18px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-add:active { background: rgba(201,168,76,0.2); transform: scale(0.97); }

/* Puntos */
.puntos-grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
}
.puntos-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(201,168,76,0.08);
}
.puntos-nombre { flex: 1; font-size: 14px; }
.puntos-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  color: var(--gold);
  min-width: 50px;
  text-align: right;
}
.puntos-btns { display: flex; gap: 4px; }
.btn-pts {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(201,168,76,0.06);
  border: 1px solid rgba(201,168,76,0.15);
  color: var(--gold);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.1s;
}
.btn-pts:active { background: rgba(201,168,76,0.2); transform: scale(0.92); }
.btn-pts.minus { color: var(--cream2); }

/* Toast */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: rgba(6,7,15,0.95);
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--gold);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  padding: 10px 24px;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* Tabs */
.tabs {
  display: flex;
  width: 100%;
  gap: 0;
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(201,168,76,0.1);
}
.tab-btn {
  flex: 1;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--cream2);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 3px;
  padding: 10px 4px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: -1px;
}
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-panel { display: none; width: 100%; }
.tab-panel.active { display: block; }
</style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<div class="screen active" id="screen-login">
  <div class="login-logo">Admin</div>
  <div class="login-sub">PANEL DE CONTROL · GRADUACIÓN 2026</div>
  <div class="login-sep"></div>
  <div class="pin-label">INTRODUCE EL CÓDIGO</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
  </div>
  <div class="numpad" id="numpad">
    <button class="numpad-btn" data-n="1">1</button>
    <button class="numpad-btn" data-n="2">2</button>
    <button class="numpad-btn" data-n="3">3</button>
    <button class="numpad-btn" data-n="4">4</button>
    <button class="numpad-btn" data-n="5">5</button>
    <button class="numpad-btn" data-n="6">6</button>
    <button class="numpad-btn" data-n="7">7</button>

    <button class="numpad-btn" data-n="0">0</button>
    <button class="numpad-btn ok" data-n="ok">OK</button>
  </div>
</div>

<!-- ════ ADMIN PANEL ════ -->
<div class="screen" id="screen-admin">
  <div class="admin-header">
    <div class="admin-title">◆ CONTROL</div>
    <div class="status-live">
      <div class="live-dot"></div>
      <span>EN VIVO</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="tv">📺 TV</button>
    <button class="tab-btn" data-tab="juegos">🎮 Juegos</button>
    <button class="tab-btn" data-tab="gente">👥 Gente</button>
    <button class="tab-btn" data-tab="puntos">🏆 Puntos</button>
  </div>

  <!-- TAB: TV Control -->
  <div class="tab-panel active" id="tab-tv">
    <div class="control-section">
      <div class="section-label">◆ PANTALLA TV</div>
      <button class="btn-control primary" id="btn-standby">
        <span class="btn-icon">✨</span>
        <div>
          PANTALLA STANDBY
          <span class="btn-sub">Muestra el fondo de graduación</span>
        </div>
      </button>
      <button class="btn-control primary" id="btn-ruleta">
        <span class="btn-icon">🎡</span>
        <div>
          LANZAR RULETA
          <span class="btn-sub">Muestra la ruleta en la TV</span>
        </div>
      </button>
      <button class="btn-control" id="btn-ranking">
        <span class="btn-icon">🏆</span>
        <div>
          CLASIFICACIÓN
          <span class="btn-sub">Muestra el ranking en TV</span>
        </div>
      </button>
    </div>

    <div class="control-section">
      <div class="section-label">◆ PANTALLAS</div>
      <button class="btn-control" id="btn-sync-interior">
        <span class="btn-icon">🏠</span>
        <div>
          SINCRONIZAR TV INTERIOR
          <span class="btn-sub">Casa · juegos digitales</span>
        </div>
      </button>
      <button class="btn-control" id="btn-sync-exterior">
        <span class="btn-icon">🌿</span>
        <div>
          SINCRONIZAR TV EXTERIOR
          <span class="btn-sub">Porche · juegos de campo</span>
        </div>
      </button>
    </div>

    <div class="control-section">
      <div class="section-label">◆ ESTADO ACTUAL</div>
      <div style="padding:12px;background:rgba(201,168,76,0.04);border:1px solid rgba(201,168,76,0.1);font-size:12px;color:var(--cream2);">
        <div>JUEGO: <span id="estado-juego" style="color:var(--gold)">—</span></div>
        <div style="margin-top:4px;">FASE: <span id="estado-fase" style="color:var(--gold)">En espera</span></div>
      </div>
    </div>
  </div>

  <!-- TAB: Juegos -->
  <div class="tab-panel" id="tab-juegos">
    <div class="section-label">◆ LANZAR JUEGO DIRECTO</div>
    <div class="juegos-grid" id="juegos-list">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- TAB: Gente -->
  <div class="tab-panel" id="tab-gente">
    <div class="section-label">◆ JUGADORES (<span id="player-count">0</span>)</div>
    <div class="jugadores-wrap" id="jugadores-wrap">
      <!-- populated by JS -->
    </div>
    <div class="add-jugador-row">
      <input class="input-nombre-admin" id="input-nuevo" type="text" placeholder="Añadir nombre..." maxlength="16" autocapitalize="words" autocomplete="off"/>
      <button class="btn-add" id="btn-add-jugador">+</button>
    </div>
    <br>
    <button class="btn-control danger" id="btn-random-teams" style="margin-top:8px">
      <span class="btn-icon">🎲</span>
      <div>
        EQUIPOS RANDOM
        <span class="btn-sub">Divide el grupo en dos equipos</span>
      </div>
    </button>
    <div id="equipos-result" style="display:none;margin-top:12px;width:100%">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div class="section-label" style="color:rgba(74,144,226,0.6)">◆ EQUIPO AZUL</div>
          <div id="equipo-azul" style="display:flex;flex-direction:column;gap:4px"></div>
        </div>
        <div>
          <div class="section-label" style="color:rgba(204,51,51,0.6)">◆ EQUIPO ROJO</div>
          <div id="equipo-rojo" style="display:flex;flex-direction:column;gap:4px"></div>
        </div>
      </div>

  </div>

  <!-- TAB: Puntos -->

    <div class="section-label">◆ PUNTUACIÓN MANUAL</div>

      <!-- populated by JS -->
    </div>

    <button class="btn-control danger" id="btn-reset-puntos">
      <span class="btn-icon">🗑️</span>

      </div>

</div>

<div id="toast">✓ ENVIADO</div>

<script>
// ─── FIREBASE ───
const firebaseConfig = {
  apiKey: "AIzaSyAib6PDnV_u8GuDp-PnJvop91qv9JHfffc",
  authDomain: "impostor-322cc.firebaseapp.com",
  databaseURL: "https://impostor-322cc-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "impostor-322cc",
  storageBucket: "impostor-322cc.firebasestorage.app",
  messagingSenderId: "808449155212",
  appId: "1:808449155212:web:c32ca0565b083056f31ba9"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const hubRef = db.ref('hub');
const jugadoresRef = db.ref('hub/jugadores');
const rankingRef = db.ref('hub/ranking');

// ─── PIN ───
const PIN = '2026';
let pinInput = '';

document.getElementById('numpad').addEventListener('click', e => {
  const n = e.target.dataset.n;
  if (!n) return;
  if (n === 'del') { pinInput = pinInput.slice(0, -1); }
  else if (n === 'ok') { checkPin(); return; }
  else if (pinInput.length < 4) { pinInput += n; }
  updatePinDots();
  if (pinInput.length === 4) setTimeout(checkPin, 150);
});

function updatePinDots(error = false) {
  document.querySelectorAll('.pin-dot').forEach((d, i) => {
    d.className = 'pin-dot' + (i < pinInput.length ? (error ? ' error' : ' filled') : '');
  });
}

function checkPin() {
  if (pinInput === PIN) {
    mostrarPantalla('screen-admin');
  } else {
    updatePinDots(true);
    setTimeout(() => { pinInput = ''; updatePinDots(); }, 800);
  }
}

// ─── JUEGOS ───
const JUEGOS = [
  { id:'impostor-palabras', nombre:'Undercover', emoji:'🕵️', tema:'Espionaje', loc:'Interior', idx:0 },
  { id:'impostor-nave', nombre:'El Impostor', emoji:'🔪', tema:'Nave espacial', loc:'Interior', idx:1 },
  { id:'bomba', nombre:'Bomba', emoji:'💣', tema:'Sala de hackeo', loc:'Interior', idx:2 },
  { id:'trivia', nombre:'Trivia Graduados', emoji:'🎓', tema:'Anuario', loc:'Interior', idx:3 },
  { id:'adivina', nombre:'Adivina Quién', emoji:'💬', tema:'Confesionario', loc:'Interior', idx:4 },
  { id:'votacion', nombre:'¿Quién Más...?', emoji:'🗳️', tema:'Tribunal', loc:'Interior', idx:5 },
  { id:'karaoke', nombre:'Karaoke', emoji:'🎤', tema:'Escenario', loc:'Interior', idx:6 },
  { id:'dibujar', nombre:'Dibuja y Adivina', emoji:'🎨', tema:'Galería', loc:'Interior', idx:7 },
  { id:'esconder', nombre:'Esconder Objeto', emoji:'🫙', tema:'Indiana Jones', loc:'Exterior', idx:8 },
  { id:'escondite', nombre:'Escondite Extremo', emoji:'🏃', tema:'Supervivencia', loc:'Exterior', idx:9 }
];

function renderJuegos() {
  const list = document.getElementById('juegos-list');
  list.innerHTML = JUEGOS.map(j => `
    <button class="juego-btn" onclick="lanzarJuego(${j.idx})">
      <span class="j-emoji">${j.emoji}</span>
      <div class="j-info">
        <span class="j-nombre">${j.nombre}</span>
        <span class="j-meta">${j.tema}</span>
      </div>
      <span class="j-loc">${j.loc === 'Exterior' ? '🌿 Ext' : '🏠 Int'}</span>
    </button>
  `).join('');
}
renderJuegos();

// ─── JUGADORES ───
let jugadores = {};

jugadoresRef.on('value', snap => {
  jugadores = snap.val() || {};
  renderJugadores();
  renderPuntos();
});

function renderJugadores() {
  const wrap = document.getElementById('jugadores-wrap');
  const arr = Object.keys(jugadores);
  document.getElementById('player-count').textContent = arr.length;

  if (arr.length === 0) {
    wrap.innerHTML = '<span style="font-size:11px;color:rgba(201,168,76,0.3)">Sin jugadores aún</span>';
    return;
  }
  wrap.innerHTML = arr.map(id => `
    <div class="jugador-chip">
      ${jugadores[id].nombre || id}
      <span class="chip-del" onclick="eliminarJugador('${id}')">×</span>
    </div>
  `).join('');
}

function renderPuntos() {
  const grid = document.getElementById('puntos-grid');
  const arr = Object.keys(jugadores);
  if (arr.length === 0) {
    grid.innerHTML = '<div style="font-size:11px;color:rgba(201,168,76,0.3);padding:12px">Añade jugadores primero</div>';
    return;
  }
  grid.innerHTML = arr.map(id => {
    const j = jugadores[id];
    const pts = j.puntos || 0;
    return `
      <div class="puntos-item">
        <div class="puntos-nombre">${j.nombre || id}</div>
        <div class="puntos-val">${pts}</div>
        <div class="puntos-btns">
          <button class="btn-pts minus" onclick="cambiarPuntos('${id}', -10)">−</button>
          <button class="btn-pts" onclick="cambiarPuntos('${id}', 10)">+</button>
        </div>
      </div>
    `;
  }).join('');
}

function eliminarJugador(id) {
  jugadoresRef.child(id).remove();
}

function cambiarPuntos(id, delta) {
  const current = (jugadores[id] && jugadores[id].puntos) || 0;
  const nuevo = Math.max(0, current + delta);
  jugadoresRef.child(id).update({ puntos: nuevo });

  // Actualizar ranking en hub
  const rankingUpd = {};
  Object.keys(jugadores).forEach(uid => {
    const j = jugadores[uid];
    const pts = uid === id ? nuevo : (j.puntos || 0);
    rankingUpd[j.nombre || uid] = pts;
  });
  rankingRef.set(rankingUpd);
  showToast(`${delta > 0 ? '+' : ''}${delta} pts`);
}

document.getElementById('btn-add-jugador').addEventListener('click', addJugador);
document.getElementById('input-nuevo').addEventListener('keydown', e => { if (e.key === 'Enter') addJugador(); });

function addJugador() {
  const input = document.getElementById('input-nuevo');
  const nombre = input.value.trim();
  if (!nombre) return;
  const id = 'manual_' + Date.now();
  jugadoresRef.child(id).set({ nombre, puntos: 0 });
  input.value = '';
  showToast('✓ Añadido');
}

// Equipos random
document.getElementById('btn-random-teams').addEventListener('click', () => {
  const arr = Object.entries(jugadores).map(([id, j]) => j.nombre || id);
  if (arr.length < 2) { showToast('Necesitas más jugadores'); return; }
  const shuffled = arr.sort(() => Math.random() - 0.5);
  const mid = Math.ceil(shuffled.length / 2);
  const azul = shuffled.slice(0, mid);
  const rojo = shuffled.slice(mid);

  document.getElementById('equipos-result').style.display = 'block';
  document.getElementById('equipo-azul').innerHTML = azul.map(n =>
    `<div style="padding:6px 10px;border:1px solid rgba(74,144,226,0.2);font-size:13px">${n}</div>`
  ).join('');
  document.getElementById('equipo-rojo').innerHTML = rojo.map(n =>
    `<div style="padding:6px 10px;border:1px solid rgba(204,51,51,0.2);font-size:13px">${n}</div>`
  ).join('');

  // Guardar equipos en Firebase
  hubRef.update({ equipoAzul: azul, equipoRojo: rojo });
  showToast('¡Equipos creados!');
});

document.getElementById('btn-reset-puntos').addEventListener('click', () => {
  if (!confirm('¿Reiniciar todos los puntos?')) return;
  const upd = {};
  Object.keys(jugadores).forEach(id => { upd[id + '/puntos'] = 0; });
  jugadoresRef.update(upd);
  rankingRef.set({});
  showToast('Puntos reiniciados');
});

// ─── CONTROL TV ───
function enviarComando(cmd, extra = {}) {
  hubRef.update({ comando: cmd, ...extra, timestamp: Date.now() });
  showToast('Enviado a TV');
}

document.getElementById('btn-standby').addEventListener('click', () => enviarComando('standby'));
document.getElementById('btn-ruleta').addEventListener('click', () => enviarComando('ruleta'));
document.getElementById('btn-ranking').addEventListener('click', () => enviarComando('ranking'));
document.getElementById('btn-sync-interior').addEventListener('click', () => {
  hubRef.update({ pantalla: 'interior' });
  showToast('TV Interior sincronizada');
});
document.getElementById('btn-sync-exterior').addEventListener('click', () => {
  hubRef.update({ pantalla: 'exterior' });
  showToast('TV Exterior sincronizada');
});

function lanzarJuego(idx) {
  enviarComando('lanzar', { juegoIndex: idx });
  showToast('🚀 ¡Lanzando!');
}

// Estado en tiempo real
hubRef.on('value', snap => {
  const d = snap.val();
  if (!d) return;
  document.getElementById('estado-juego').textContent = d.juegoActual || '—';
  document.getElementById('estado-fase').textContent = d.fase || 'En espera';
});

// ─── TABS ───
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
  });
});

// ─── UTILITIES ───
function mostrarPantalla(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
