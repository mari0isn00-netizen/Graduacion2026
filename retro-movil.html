<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Duelos Retro — Únete</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--pixel:#39ff14;--gold:#c9a84c;--dark:#04050d;--cream:#f0e6cc;--teamA:#4a90e2;--teamB:#ff3333;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;background:var(--dark);color:var(--cream);font-family:'Share Tech Mono',monospace;overflow:hidden;touch-action:manipulation;}
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.screen.active{display:flex;}

/* ── REGISTRO ── */
#scr-reg{gap:20px;text-align:center;background:var(--dark);}
.reg-icon{font-size:clamp(48px,14vw,72px);animation:float 2.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.reg-title{font-family:'Press Start 2P',monospace;font-size:clamp(14px,4.5vw,22px);color:var(--pixel);text-shadow:0 0 20px rgba(57,255,20,0.5);line-height:1.5;}
.reg-sub{font-family:'VT323',monospace;font-size:clamp(16px,5vw,22px);letter-spacing:8px;color:rgba(57,255,20,0.35);margin-top:-8px;}
.reg-input{width:100%;max-width:300px;background:rgba(57,255,20,0.06);border:none;border-bottom:2px solid rgba(57,255,20,0.3);color:var(--pixel);font-family:'Share Tech Mono',monospace;font-size:clamp(18px,5vw,24px);padding:14px 18px;text-align:center;letter-spacing:4px;outline:none;caret-color:var(--pixel);}
.reg-input::placeholder{color:rgba(57,255,20,0.2);}
.reg-input:focus{border-color:var(--pixel);box-shadow:0 4px 20px rgba(57,255,20,0.15);}
.reg-btn{width:100%;max-width:300px;background:var(--pixel);color:#000;font-family:'Press Start 2P',monospace;font-size:clamp(12px,4vw,16px);padding:16px;border:none;cursor:pointer;letter-spacing:2px;transition:all .15s;}
.reg-btn:active{transform:scale(.97);opacity:.85;}
.reg-err{color:var(--teamB);font-family:'VT323',monospace;font-size:18px;letter-spacing:4px;min-height:24px;}

/* ── BIENVENIDA EQUIPO ── */
#scr-equipo{gap:14px;text-align:center;}
#scr-equipo.ta{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(74,144,226,0.12) 0%,var(--dark) 70%);}
#scr-equipo.tb{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(255,51,51,0.12) 0%,var(--dark) 70%);}
.eq-asignado{font-family:'VT323',monospace;font-size:clamp(13px,4vw,18px);letter-spacing:8px;color:rgba(255,255,255,0.3);}
.eq-nombre{font-family:'Press Start 2P',monospace;font-size:clamp(18px,5vw,26px);color:var(--cream);line-height:1.4;}
.eq-escudo{font-size:clamp(60px,18vw,90px);animation:pop .5s cubic-bezier(0.34,1.56,.64,1) both;}
@keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
.eq-equipo{font-family:'Press Start 2P',monospace;font-size:clamp(22px,7vw,34px);line-height:1.2;}
.eq-equipo.ta{color:var(--teamA);text-shadow:0 0 30px rgba(74,144,226,0.6);}
.eq-equipo.tb{color:var(--teamB);text-shadow:0 0 30px rgba(255,51,51,0.6);}
.eq-desc{font-family:'VT323',monospace;font-size:clamp(14px,4.5vw,20px);letter-spacing:4px;opacity:.5;margin-top:4px;}
.eq-status{font-family:'VT323',monospace;font-size:clamp(14px,4.5vw,19px);letter-spacing:6px;color:rgba(57,255,20,0.4);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}

/* ── ESPERA ── */
#scr-espera{gap:14px;text-align:center;}
.esp-icon{font-size:clamp(48px,14vw,72px);animation:float 2.5s ease-in-out infinite;}
.esp-nombre{font-family:'Press Start 2P',monospace;font-size:clamp(14px,4.5vw,20px);line-height:1.4;}
.esp-nombre.ta{color:var(--teamA);}
.esp-nombre.tb{color:var(--teamB);}
.esp-team{font-family:'VT323',monospace;font-size:clamp(15px,5vw,21px);letter-spacing:8px;opacity:.4;margin-top:2px;}
.esp-team.ta{color:var(--teamA);}
.esp-team.tb{color:var(--teamB);}
.esp-status{font-family:'VT323',monospace;font-size:clamp(13px,4.5vw,18px);letter-spacing:5px;color:rgba(57,255,20,0.4);animation:pulse 2s ease-in-out infinite;margin-top:8px;}
.esp-scores{display:flex;gap:20px;margin-top:12px;padding:10px 24px;border:1px solid rgba(255,255,255,0.07);}
.esp-sc{display:flex;flex-direction:column;align-items:center;gap:3px;}
.esp-sc-lbl{font-family:'VT323',monospace;font-size:13px;letter-spacing:4px;opacity:.4;}
.esp-sc-lbl.ta{color:var(--teamA);}
.esp-sc-lbl.tb{color:var(--teamB);}
.esp-sc-n{font-family:'Press Start 2P',monospace;font-size:clamp(22px,7vw,30px);}
.esp-sc-n.ta{color:var(--teamA);}
.esp-sc-n.tb{color:var(--teamB);}

/* ── DUELO CONVOCADO ── */
#scr-duelo{gap:14px;text-align:center;}
#scr-duelo.ta{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(74,144,226,0.12) 0%,var(--dark) 70%);}
#scr-duelo.tb{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(255,51,51,0.12) 0%,var(--dark) 70%);}
#scr-duelo.obs{background:var(--dark);}
.d-tag{font-family:'VT323',monospace;font-size:clamp(14px,4.5vw,20px);letter-spacing:10px;color:var(--pixel);animation:blink .6s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.d-eres{font-family:'VT323',monospace;font-size:clamp(13px,4vw,18px);letter-spacing:6px;opacity:.4;}
.d-nombre{font-family:'Press Start 2P',monospace;font-size:clamp(16px,5vw,24px);line-height:1.4;}
.d-nombre.ta{color:var(--teamA);}
.d-nombre.tb{color:var(--teamB);}
.d-rival-lbl{font-family:'VT323',monospace;font-size:clamp(13px,4vw,17px);letter-spacing:4px;color:rgba(255,255,255,0.3);margin-top:6px;}
.d-rival{font-family:'VT323',monospace;font-size:clamp(18px,5.5vw,26px);letter-spacing:4px;color:rgba(255,255,255,0.7);}
.d-mj-box{padding:14px 20px;border:2px solid rgba(57,255,20,0.28);background:rgba(57,255,20,0.04);width:100%;max-width:320px;}
.d-mj-lbl{font-family:'VT323',monospace;font-size:13px;letter-spacing:8px;color:rgba(57,255,20,0.35);margin-bottom:5px;}
.d-mj-nm{font-family:'Press Start 2P',monospace;font-size:clamp(11px,3.5vw,16px);color:var(--pixel);line-height:1.4;}
.d-mj-inst{font-family:'VT323',monospace;font-size:clamp(14px,4.5vw,19px);color:rgba(240,230,204,0.5);margin-top:6px;letter-spacing:2px;}
.d-wait{font-family:'VT323',monospace;font-size:clamp(13px,4.5vw,18px);letter-spacing:5px;color:rgba(57,255,20,0.35);animation:pulse 1.5s ease-in-out infinite;margin-top:6px;}
.obs-lbl{font-family:'VT323',monospace;font-size:clamp(13px,4.5vw,18px);letter-spacing:5px;color:rgba(255,255,255,0.25);}

/* ── MINIJUEGO ── */
#scr-mj{background:#000;}
.mj-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;width:100%;height:100%;padding:20px;}
.mj-lbl{font-family:'VT323',monospace;font-size:clamp(15px,5vw,21px);letter-spacing:6px;color:rgba(57,255,20,0.5);text-align:center;}

.big-btn{width:min(240px,72vw);height:min(240px,72vw);border-radius:50%;font-family:'Press Start 2P',monospace;font-size:clamp(11px,3.5vw,16px);border:4px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.5;transition:transform .1s;padding:20px;}
.big-btn:active{transform:scale(.91);}
.btn-green{background:rgba(57,255,20,.14);border-color:var(--pixel);color:var(--pixel);box-shadow:0 0 35px rgba(57,255,20,.28);}
.btn-gold{background:rgba(201,168,76,.14);border-color:var(--gold);color:var(--gold);box-shadow:0 0 35px rgba(201,168,76,.28);}
.btn-red{background:rgba(255,51,51,.14);border-color:var(--teamB);color:var(--teamB);}
.btn-blue{background:rgba(74,144,226,.14);border-color:var(--teamA);color:var(--teamA);}
.btn-flash{animation:flashB .3s step-end infinite;}
@keyframes flashB{0%,100%{opacity:1;}50%{opacity:.3;}}

.mj-result{font-family:'Press Start 2P',monospace;font-size:clamp(18px,6vw,28px);text-align:center;animation:pop .4s cubic-bezier(0.34,1.56,.64,1);}
.mj-result.win{color:var(--pixel);}
.mj-result.lose{color:var(--teamB);}
.mj-result.ok{color:var(--gold);}

.mj-timer{font-family:'VT323',monospace;font-size:clamp(46px,15vw,80px);color:var(--pixel);font-variant-numeric:tabular-nums;}
.mj-dado{font-size:clamp(72px,22vw,120px);}

.ppt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;}
.ppt-btn{padding:18px 8px;font-size:clamp(22px,7vw,36px);background:rgba(57,255,20,.07);border:2px solid rgba(57,255,20,.2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .1s;}
.ppt-btn:active{background:rgba(57,255,20,.18);transform:scale(.94);}
.ppt-lbl{font-family:'VT323',monospace;font-size:13px;letter-spacing:3px;color:rgba(255,255,255,.35);}
.ppt-btn.sel{border-color:var(--pixel);background:rgba(57,255,20,.15);}

.preg-txt{font-family:'VT323',monospace;font-size:clamp(18px,5.5vw,26px);text-align:center;color:var(--cream);line-height:1.5;margin-bottom:8px;}
.preg-opts{display:flex;flex-direction:column;gap:8px;width:100%;}
.preg-opt{padding:13px;background:rgba(57,255,20,.05);border:1px solid rgba(57,255,20,.18);font-family:'Share Tech Mono',monospace;font-size:clamp(13px,4vw,17px);cursor:pointer;text-align:center;transition:all .1s;}
.preg-opt:active{background:rgba(57,255,20,.15);}
.preg-opt.correct{border-color:var(--pixel);background:rgba(57,255,20,.18);color:var(--pixel);}
.preg-opt.wrong{border-color:var(--teamB);background:rgba(255,51,51,.1);color:var(--teamB);}

.seq-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(280px,80vw);}
.seq-btn{height:80px;border-radius:8px;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:11px;opacity:.3;transition:all .1s;}
.seq-btn.rc{background:rgba(255,51,51,.25);border-color:var(--teamB);color:var(--teamB);}
.seq-btn.bc{background:rgba(74,144,226,.25);border-color:var(--teamA);color:var(--teamA);}
.seq-btn.gc{background:rgba(57,255,20,.25);border-color:var(--pixel);color:var(--pixel);}
.seq-btn.yc{background:rgba(255,255,0,.25);border-color:#ffff00;color:#ffff00;}
.seq-btn.lit{opacity:1;transform:scale(1.05);}
.seq-btn:active{opacity:1;}

/* ── RESULTADO ── */
#scr-resultado{gap:12px;text-align:center;}
.res-icon{font-size:clamp(52px,16vw,80px);animation:float 2s ease-in-out infinite;}
.res-title{font-family:'Press Start 2P',monospace;font-size:clamp(14px,4.5vw,22px);line-height:1.4;}
.res-title.win{color:var(--pixel);}
.res-title.lose{color:var(--teamB);}
.res-sub{font-family:'VT323',monospace;font-size:clamp(14px,4.5vw,20px);letter-spacing:5px;color:rgba(255,255,255,.35);}
</style>
</head>
<body>

<!-- REGISTRO -->
<div class="screen active" id="scr-reg">
  <div class="reg-icon">🕹️</div>
  <div class="reg-title">RETRO<br>ARENA</div>
  <div class="reg-sub">— GRADUACIÓN 2026 —</div>
  <input type="text" class="reg-input" id="reg-name" placeholder="TU NOMBRE" maxlength="16" autocomplete="off" autocapitalize="words">
  <button class="reg-btn" onclick="registrarse()">UNIRME AL TORNEO ▶</button>
  <div class="reg-err" id="reg-err"></div>
</div>

<!-- BIENVENIDA EQUIPO -->
<div class="screen" id="scr-equipo">
  <div class="eq-asignado">HAS SIDO ASIGNADO A</div>
  <div class="eq-escudo" id="eq-escudo">🎮</div>
  <div class="eq-equipo" id="eq-equipo">EQUIPO AZUL</div>
  <div class="eq-desc" id="eq-desc">¡Lucha por tu equipo!</div>
  <div class="eq-status">Espera en el lobby...</div>
</div>

<!-- ESPERA -->
<div class="screen" id="scr-espera">
  <div class="esp-icon" id="esp-icon">🎮</div>
  <div class="esp-nombre" id="esp-nombre">—</div>
  <div class="esp-team" id="esp-team">EQUIPO —</div>
  <div class="esp-status" id="esp-status">Esperando al admin...</div>
  <div class="esp-scores">
    <div class="esp-sc"><div class="esp-sc-lbl ta">AZUL</div><div class="esp-sc-n ta" id="mob-sa">0</div></div>
    <div class="esp-sc"><div class="esp-sc-lbl tb">ROJO</div><div class="esp-sc-n tb" id="mob-sb">0</div></div>
  </div>
</div>

<!-- DUELO CONVOCADO -->
<div class="screen" id="scr-duelo">
  <div class="d-tag">⚡ ¡DUELO! ⚡</div>
  <div class="d-eres" id="d-eres">ERES EL DUELISTA</div>
  <div class="d-nombre" id="d-nombre">—</div>
  <div class="d-rival-lbl" id="d-rival-lbl">VS</div>
  <div class="d-rival" id="d-rival">—</div>
  <div class="d-mj-box">
    <div class="d-mj-lbl">— MINIJUEGO —</div>
    <div class="d-mj-nm" id="d-mj-nm">—</div>
    <div class="d-mj-inst" id="d-mj-inst">—</div>
  </div>
  <div class="d-wait" id="d-wait">Espera el conteo...</div>
</div>

<!-- MINIJUEGO -->
<div class="screen" id="scr-mj">
  <div class="mj-wrap" id="mj-content"></div>
</div>

<!-- RESULTADO -->
<div class="screen" id="scr-resultado">
  <div class="res-icon" id="res-ico">🏆</div>
  <div class="res-title" id="res-title">—</div>
  <div class="res-sub" id="res-sub">—</div>
</div>

<script>
const FC={apiKey:"AIzaSyAib6PDnV_u8GuDp-PnJvop91qv9JHfffc",authDomain:"impostor-322cc.firebaseapp.com",databaseURL:"https://impostor-322cc-default-rtdb.europe-west1.firebasedatabase.app",projectId:"impostor-322cc",storageBucket:"impostor-322cc.firebasestorage.app",messagingSenderId:"808449155212",appId:"1:808449155212:web:c32ca0565b083056f31ba9"};
firebase.initializeApp(FC);
const db=firebase.database(), RR=db.ref('retro');

const MJS={
  reflejos:{e:'⚡',n:'REFLEJOS DE ACERO',inst:'Pulsa el botón cuando la pantalla se ponga VERDE'},
  piedra:{e:'✂️',n:'PIEDRA PAPEL TIJERA',inst:'Elige en secreto — se revela a la vez'},
  memoria:{e:'🧠',n:'MEMORIA FLASH',inst:'Observa la secuencia y repítela en tu móvil'},
  pregunta:{e:'❓',n:'PREGUNTA RELÁMPAGO',inst:'El primero en pulsar y acertar gana el punto'},
  click:{e:'🖱️',n:'CLICK LOCO',inst:'¡Pulsa tan rápido como puedas en 10 segundos!'},
  dado:{e:'🎲',n:'EL DADO MALDITO',inst:'Pulsa para tirar — el mayor número gana'},
  adivinanza:{e:'🔤',n:'ADIVINANZA RETRO',inst:'Pulsa tu botón cuando sepas la respuesta'},
  escalera:{e:'🪜',n:'ESCALERA DE BOTONES',inst:'Sigue la secuencia sin fallar'},
};

let myName='', myTeam='', myId='', isDuelista=false, currentMj='';
let dJugA='', dJugB='';

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ── REGISTRO ──
document.getElementById('reg-name').addEventListener('keydown',e=>{if(e.key==='Enter')registrarse();});

function registrarse(){
  const n=document.getElementById('reg-name').value.trim();
  if(!n){showErr('Escribe tu nombre');return;}
  document.querySelector('.reg-btn').textContent='UNIÉNDOME...';
  document.querySelector('.reg-btn').disabled=true;

  // Contar jugadores para asignar equipo alternado
  RR.child('jugadores').once('value').then(snap=>{
    const jugs=snap.val()||{};
    const total=Object.keys(jugs).length;
    // Equipo A si el total actual (antes de unirme) es par, B si impar → alternado
    const equipo=total%2===0?'A':'B';
    myName=n.toUpperCase();
    myTeam=equipo;

    const ref=RR.child('jugadores').push();
    myId=ref.key;
    return ref.set({nombre:myName,equipo:myTeam,ts:Date.now()});
  }).then(()=>{
    mostrarEquipo();
    initListener();
  }).catch(()=>{
    showErr('Error al conectar');
    document.querySelector('.reg-btn').textContent='UNIRME AL TORNEO ▶';
    document.querySelector('.reg-btn').disabled=false;
  });
}

function showErr(msg){
  const e=document.getElementById('reg-err');
  e.textContent=msg;
  setTimeout(()=>e.textContent='',2500);
}

function mostrarEquipo(){
  const isA=myTeam==='A';
  const scr=document.getElementById('scr-equipo');
  scr.className='screen '+(isA?'ta':'tb');
  document.getElementById('eq-escudo').textContent=isA?'🔵':'🔴';
  document.getElementById('eq-equipo').textContent='EQUIPO '+(isA?'AZUL':'ROJO');
  document.getElementById('eq-equipo').className='eq-equipo '+(isA?'ta':'tb');
  document.getElementById('eq-desc').textContent=isA?'¡Lucha por el equipo Azul!':'¡Lucha por el equipo Rojo!';
  show('scr-equipo');
  setTimeout(()=>irAEspera(),2500);
}

function irAEspera(){
  const isA=myTeam==='A';
  document.getElementById('esp-icon').textContent=isA?'🔵':'🔴';
  document.getElementById('esp-nombre').textContent=myName;
  document.getElementById('esp-nombre').className='esp-nombre '+(isA?'ta':'tb');
  document.getElementById('esp-team').textContent='EQUIPO '+(isA?'AZUL':'ROJO');
  document.getElementById('esp-team').className='esp-team '+(isA?'ta':'tb');
  show('scr-espera');
}

// ── LISTENER FIREBASE ──
function initListener(){
  RR.on('value',snap=>{
    const d=snap.val();if(!d)return;
    if(d.scoreA!==undefined) document.getElementById('mob-sa').textContent=d.scoreA;
    if(d.scoreB!==undefined) document.getElementById('mob-sb').textContent=d.scoreB;
    if(!d.cmd)return;
    const cmd=d.cmd;

    if(cmd==='lobby'){
      irAEspera();
      document.getElementById('esp-status').textContent='Lobby abierto — espera';

    }else if(cmd==='duelo'){
      currentMj=d.minijuego||'reflejos';
      dJugA=(d.jugadorA||'').toUpperCase();
      dJugB=(d.jugadorB||'').toUpperCase();
      isDuelista=(myName===dJugA||myName===dJugB);
      const isA_duelo=myName===dJugA;
      const mj=MJS[currentMj]||MJS.reflejos;

      document.getElementById('d-mj-nm').textContent=mj.e+' '+mj.n;
      document.getElementById('d-mj-inst').textContent=mj.inst;

      const scr=document.getElementById('scr-duelo');
      if(isDuelista){
        const rival=isA_duelo?dJugB:dJugA;
        scr.className='screen '+(myTeam==='A'?'ta':'tb');
        document.getElementById('d-eres').textContent='¡TÚ DUELEAS!';
        document.getElementById('d-nombre').textContent=myName;
        document.getElementById('d-nombre').className='d-nombre '+(myTeam==='A'?'ta':'tb');
        document.getElementById('d-rival-lbl').textContent='VS';
        document.getElementById('d-rival').textContent=rival;
        document.getElementById('d-wait').textContent='Espera el conteo...';
      } else {
        scr.className='screen obs';
        document.getElementById('d-eres').textContent='DUELO EN CURSO';
        document.getElementById('d-nombre').textContent=dJugA;
        document.getElementById('d-nombre').className='d-nombre ta';
        document.getElementById('d-rival-lbl').textContent='VS';
        document.getElementById('d-rival').textContent=dJugB;
        document.getElementById('d-wait').textContent='Eres espectador — mira la TV';
      }
      show('scr-duelo');

    }else if(cmd==='conteo'||cmd==='jugando'){
      if(isDuelista){
        lanzarMj(currentMj);
      } else {
        document.getElementById('esp-status').textContent='Duelo en curso — mira la TV 📺';
        irAEspera();
      }

    }else if(cmd==='ganador'){
      const ganEq=d.ganadorEquipo;
      const ganNm=(d.ganadorNombre||'').toUpperCase();
      const yoGane=ganNm===myName;
      const miEqGana=ganEq===myTeam;
      document.getElementById('res-ico').textContent=yoGane?'🏆':(miEqGana?'🎉':'😤');
      document.getElementById('res-title').textContent=yoGane?'¡HAS GANADO!':(miEqGana?'¡TU EQUIPO GANA!':'Han ganado ellos');
      document.getElementById('res-title').className='res-title '+(miEqGana?'win':'lose');
      document.getElementById('res-sub').textContent=ganNm+' · EQ.'+(ganEq==='A'?'AZUL':'ROJO');
      show('scr-resultado');
      setTimeout(()=>irAEspera(),4000);

    }else if(cmd==='campeones'){
      const campEq=d.campeonEquipo;
      const miEqCamp=campEq===myTeam;
      document.getElementById('res-ico').textContent=miEqCamp?'🏆':'🎖️';
      document.getElementById('res-title').textContent=miEqCamp?'¡CAMPEONES!':'Buena batalla';
      document.getElementById('res-title').className='res-title '+(miEqCamp?'win':'lose');
      document.getElementById('res-sub').textContent='TORNEO FINALIZADO · EQ.'+(campEq==='A'?'AZUL':'ROJO');
      show('scr-resultado');
    }
  });
}

// ══ MINIJUEGOS ══
function lanzarMj(id){
  show('scr-mj');
  const c=document.getElementById('mj-content');
  c.innerHTML='';
  if(id==='reflejos') mjReflejos(c);
  else if(id==='piedra') mjPiedra(c);
  else if(id==='click') mjClick(c);
  else if(id==='dado') mjDado(c);
  else if(id==='memoria') mjMemoria(c);
  else if(id==='pregunta') mjPregunta(c);
  else if(id==='adivinanza') mjAdivinanza(c);
  else if(id==='escalera') mjEscalera(c);
}

function mjReflejos(c){
  let fase='espera',timer=null;
  c.innerHTML=`<div class="mj-lbl">¡PULSA CUANDO SEA VERDE!</div><button class="big-btn btn-red btn-flash" id="rfl">ESPERA...</button><div class="mj-result" id="rfl-r" style="min-height:40px"></div>`;
  const btn=document.getElementById('rfl');
  const res=document.getElementById('rfl-r');
  const delay=1500+Math.random()*3500;
  timer=setTimeout(()=>{fase='verde';btn.className='big-btn btn-green btn-flash';btn.textContent='¡PULSA!';},delay);
  btn.onclick=()=>{
    if(fase==='espera'){clearTimeout(timer);btn.className='big-btn btn-red';btn.textContent='⛔ PRONTO';res.textContent='¡Demasiado pronto!';res.className='mj-result lose';}
    else if(fase==='verde'){fase='done';btn.className='big-btn btn-green';btn.textContent='✅ PULSADO';res.textContent='¡Díselo al admin!';res.className='mj-result win';}
  };
}

function mjPiedra(c){
  let chosen=null;
  c.innerHTML=`<div class="mj-lbl">ELIGE TU MOVIMIENTO</div>
    <div class="ppt-grid">
      <button class="ppt-btn" id="pp-p" onclick="pptElig('p')">🪨<div class="ppt-lbl">PIEDRA</div></button>
      <button class="ppt-btn" id="pp-pa" onclick="pptElig('pa')">📄<div class="ppt-lbl">PAPEL</div></button>
      <button class="ppt-btn" id="pp-t" onclick="pptElig('t')">✂️<div class="ppt-lbl">TIJERA</div></button>
    </div>
    <div class="mj-result ok" id="ppt-msg" style="min-height:32px;font-size:clamp(13px,4vw,18px)">Elige en secreto</div>`;
  window.pptElig=e=>{if(chosen)return;chosen=e;document.querySelectorAll('.ppt-btn').forEach(b=>b.classList.remove('sel'));document.getElementById('pp-'+e).classList.add('sel');document.getElementById('ppt-msg').textContent='Elegido ✅ — no cambies';};
}

function mjClick(c){
  let count=0,running=true,t=10;
  c.innerHTML=`<div class="mj-lbl">¡PULSA LO MÁS RÁPIDO POSIBLE!</div><button class="big-btn btn-green" id="clk-btn" onclick="clkP()">0<br><span style="font-size:11px">CLICKS</span></button><div class="mj-timer" id="clk-t">10</div>`;
  const btn=document.getElementById('clk-btn');
  const tEl=document.getElementById('clk-t');
  const iv=setInterval(()=>{t--;tEl.textContent=t;if(t<=3)tEl.style.color='var(--teamB)';if(t<=0){clearInterval(iv);running=false;btn.innerHTML=count+'<br><span style="font-size:11px">CLICKS ✅</span>';btn.style.background='rgba(57,255,20,.3)';}},1000);
  window.clkP=()=>{if(!running)return;count++;btn.innerHTML=count+'<br><span style="font-size:11px">CLICKS</span>';};
}

function mjDado(c){
  const D=['⚀','⚁','⚂','⚃','⚄','⚅'];let tirado=false;
  c.innerHTML=`<div class="mj-lbl">TIRA EL DADO</div><div class="mj-dado" id="dado-e">🎲</div><button class="big-btn btn-gold" id="dado-btn" onclick="dadoT()">TIRAR</button><div class="mj-result ok" id="dado-r" style="min-height:32px"></div>`;
  window.dadoT=()=>{
    if(tirado)return;tirado=true;
    const btn=document.getElementById('dado-btn');btn.style.opacity='.4';
    const de=document.getElementById('dado-e');
    const roll=setInterval(()=>de.textContent=D[~~(Math.random()*6)],80);
    setTimeout(()=>{clearInterval(roll);const r=~~(Math.random()*6);de.textContent=D[r];document.getElementById('dado-r').textContent='Sacaste '+(r+1)+'!';},1200);
  };
}

function mjMemoria(c){
  const COLS=['rc','bc','gc','yc'];const LABS=['🔴','🔵','🟢','🟡'];
  const SEQ=[...Array(5)].map(()=>~~(Math.random()*4));
  let fase='mostrando',ps=[],step=0;
  c.innerHTML=`<div class="mj-lbl" id="mem-lbl">Observa la secuencia...</div>
    <div class="seq-grid">${COLS.map((col,i)=>`<button class="seq-btn ${col}" id="sb${i}" onclick="memP(${i})">${LABS[i]}</button>`).join('')}</div>`;
  function ilum(idx,cb){const el=document.getElementById('sb'+idx);el.classList.add('lit');setTimeout(()=>{el.classList.remove('lit');setTimeout(cb,250);},600);}
  function mostrar(i){if(i>=SEQ.length){fase='jugando';document.getElementById('mem-lbl').textContent='¡Repítela tú!';return;}ilum(SEQ[i],()=>mostrar(i+1));}
  setTimeout(()=>mostrar(0),700);
  window.memP=i=>{
    if(fase!=='jugando')return;
    const el=document.getElementById('sb'+i);el.classList.add('lit');setTimeout(()=>el.classList.remove('lit'),280);
    ps.push(i);
    if(i!==SEQ[ps.length-1]){document.getElementById('mem-lbl').textContent='❌ Error — díselo al admin';fase='done';return;}
    if(ps.length===SEQ.length){document.getElementById('mem-lbl').textContent='✅ ¡Completada! Díselo al admin';fase='done';}
  };
}

const PREG=[
  {q:'¿Cuántos planetas tiene el Sistema Solar?',o:['7','8','9','10'],a:1},
  {q:'¿Capital de Francia?',o:['Berlín','Madrid','París','Roma'],a:2},
  {q:'¿En qué año llegó el hombre a la Luna?',o:['1965','1967','1969','1972'],a:2},
  {q:'¿Lados de un hexágono?',o:['5','6','7','8'],a:1},
  {q:'¿Quién escribió El Quijote?',o:['Lope de Vega','Quevedo','Cervantes','Calderón'],a:2},
  {q:'¿Océano más grande?',o:['Atlántico','Índico','Ártico','Pacífico'],a:3},
  {q:'¿Colores del arcoíris?',o:['5','6','7','8'],a:2},
  {q:'¿Metal más abundante en la Tierra?',o:['Hierro','Aluminio','Cobre','Oro'],a:0},
  {q:'¿Fin de la II Guerra Mundial?',o:['1943','1944','1945','1946'],a:2},
  {q:'¿Huesos del cuerpo humano adulto?',o:['186','206','226','246'],a:1},
];
function mjPregunta(c){
  const q=PREG[~~(Math.random()*PREG.length)];let answered=false;
  c.innerHTML=`<div class="preg-txt">${q.q}</div><div class="preg-opts">${q.o.map((o,i)=>`<button class="preg-opt" id="po${i}" onclick="pregR(${i})">${o}</button>`).join('')}</div><div class="mj-result ok" id="preg-r" style="min-height:28px;margin-top:6px"></div>`;
  window.pregR=i=>{if(answered)return;answered=true;document.querySelectorAll('.preg-opt').forEach((b,idx)=>{if(idx===q.a)b.classList.add('correct');else if(idx===i&&i!==q.a)b.classList.add('wrong');});document.getElementById('preg-r').textContent=i===q.a?'✅ ¡CORRECTO!':'❌ Fallaste';document.getElementById('preg-r').className='mj-result '+(i===q.a?'win':'lose');};
}

const ADIV=[
  {q:'Tengo ciudades, pero no casas; montañas, pero no árboles; agua, pero no peces.',r:'Un mapa'},
  {q:'Cuanto más seco, más mojo.',r:'Una toalla'},
  {q:'Habla sin boca y escucha sin orejas.',r:'Un eco'},
  {q:'Tengo manos pero no puedo aplaudir.',r:'Un reloj'},
  {q:'¿Qué invento permite ver a través de las paredes?',r:'Una ventana'},
];
function mjAdivinanza(c){
  const a=ADIV[~~(Math.random()*ADIV.length)];let rev=false;
  c.innerHTML=`<div class="preg-txt" style="font-size:clamp(15px,4.5vw,21px)">${a.q}</div><button class="big-btn btn-green" id="adiv-btn" onclick="adivP()">¡SÉ LA<br>RESPUESTA!</button><div class="mj-result" id="adiv-r" style="min-height:32px;font-size:clamp(14px,4.5vw,20px)"></div>`;
  window.adivP=()=>{if(rev)return;rev=true;document.getElementById('adiv-btn').style.display='none';document.getElementById('adiv-r').innerHTML='<span style="color:var(--pixel)">'+a.r+'</span><br><span style="font-size:12px;color:rgba(255,255,255,.35)">Dila en voz alta</span>';};
}

function mjEscalera(c){
  const BTNS=[{id:'e0',l:'🔴',col:'btn-red'},{id:'e1',l:'🔵',col:'btn-blue'},{id:'e2',l:'🟢',col:'btn-green'},{id:'e3',l:'🟡',col:'btn-gold'}];
  const SEQ=[...Array(5)].map(()=>~~(Math.random()*4));
  let step=0,fail=false;
  c.innerHTML=`<div class="mj-lbl">Sigue: ${SEQ.map(i=>BTNS[i].l).join(' → ')}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(250px,76vw)">
      ${BTNS.map((b,i)=>`<button class="${b.col}" style="height:80px;border-radius:8px;font-size:30px;cursor:pointer;border:4px solid transparent;background:rgba(255,255,255,.07)" onclick="escP(${i})">${b.l}</button>`).join('')}
    </div>
    <div class="mj-lbl" id="esc-lbl">${step+1}/${SEQ.length}</div>`;
  window.escP=i=>{
    if(fail||step>=SEQ.length)return;
    const lbl=document.getElementById('esc-lbl');
    if(i===SEQ[step]){step++;if(step>=SEQ.length){lbl.textContent='✅ ¡Completada! Díselo al admin';}else{lbl.textContent=(step+1)+'/'+SEQ.length;}}
    else{fail=true;lbl.textContent='❌ Error en paso '+(step+1)+' — díselo al admin';}
  };
}
