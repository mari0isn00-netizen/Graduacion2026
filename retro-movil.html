<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Duelos Retro — Móvil</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--pixel:#39ff14;--gold:#c9a84c;--dark:#04050d;--cream:#f0e6cc;--A:#4a90e2;--B:#ff3333;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;background:var(--dark);color:var(--cream);font-family:'Share Tech Mono',monospace;overflow:hidden;touch-action:manipulation;}
.scr{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:22px;}
.scr.on{display:flex;}

/* REGISTRO */
#s-reg{gap:18px;text-align:center;background:var(--dark);}
.ri{font-size:clamp(46px,14vw,70px);animation:fl 2.5s ease-in-out infinite;}
@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.rt{font-family:'Press Start 2P',monospace;font-size:clamp(13px,4.2vw,20px);color:var(--pixel);text-shadow:0 0 18px rgba(57,255,20,.5);line-height:1.5;}
.rs{font-family:'VT323',monospace;font-size:clamp(15px,5vw,21px);letter-spacing:8px;color:rgba(57,255,20,.32);margin-top:-6px;}
.rinput{width:100%;max-width:290px;background:rgba(57,255,20,.05);border:none;border-bottom:2px solid rgba(57,255,20,.28);color:var(--pixel);font-family:'Share Tech Mono',monospace;font-size:clamp(17px,5vw,23px);padding:13px 16px;text-align:center;letter-spacing:4px;outline:none;caret-color:var(--pixel);}
.rinput::placeholder{color:rgba(57,255,20,.18);}
.rinput:focus{border-color:var(--pixel);}
.rbtn{width:100%;max-width:290px;background:var(--pixel);color:#000;font-family:'Press Start 2P',monospace;font-size:clamp(11px,3.8vw,15px);padding:15px;border:none;cursor:pointer;letter-spacing:2px;}
.rbtn:active{transform:scale(.97);opacity:.85;}
.rerr{color:var(--B);font-family:'VT323',monospace;font-size:17px;letter-spacing:4px;min-height:22px;text-align:center;}

/* EQUIPO ASIGNADO */
#s-eq{gap:13px;text-align:center;}
#s-eq.ea{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(74,144,226,.1) 0%,var(--dark) 70%);}
#s-eq.eb{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(255,51,51,.1) 0%,var(--dark) 70%);}
.eq-lbl{font-family:'VT323',monospace;font-size:clamp(12px,4vw,17px);letter-spacing:8px;color:rgba(255,255,255,.28);}
.eq-esc{font-size:clamp(58px,17vw,86px);animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
.eq-nm{font-family:'Press Start 2P',monospace;font-size:clamp(20px,6.5vw,32px);line-height:1.2;}
.eq-nm.ea{color:var(--A);text-shadow:0 0 28px rgba(74,144,226,.55);}
.eq-nm.eb{color:var(--B);text-shadow:0 0 28px rgba(255,51,51,.55);}
.eq-desc{font-family:'VT323',monospace;font-size:clamp(13px,4.2vw,19px);letter-spacing:4px;opacity:.45;margin-top:3px;}

/* ESPERA */
#s-wait{gap:13px;text-align:center;}
.wi{font-size:clamp(46px,14vw,70px);animation:fl 2.5s ease-in-out infinite;}
.wn{font-family:'Press Start 2P',monospace;font-size:clamp(13px,4.2vw,19px);line-height:1.4;}
.wn.ea{color:var(--A);}
.wn.eb{color:var(--B);}
.wt{font-family:'VT323',monospace;font-size:clamp(14px,4.8vw,20px);letter-spacing:8px;opacity:.38;margin-top:2px;}
.wt.ea{color:var(--A);}
.wt.eb{color:var(--B);}
.wst{font-family:'VT323',monospace;font-size:clamp(12px,4.2vw,17px);letter-spacing:5px;color:rgba(57,255,20,.38);animation:pulse 2s ease-in-out infinite;margin-top:7px;}
@keyframes pulse{0%,100%{opacity:.32;}50%{opacity:1;}}
.wsc{display:flex;gap:18px;margin-top:10px;padding:9px 22px;border:1px solid rgba(255,255,255,.06);}
.ws{display:flex;flex-direction:column;align-items:center;gap:2px;}
.wsl{font-family:'VT323',monospace;font-size:12px;letter-spacing:4px;opacity:.38;}
.wsl.ea{color:var(--A);}
.wsl.eb{color:var(--B);}
.wsn{font-family:'Press Start 2P',monospace;font-size:clamp(20px,6.5vw,28px);}
.wsn.ea{color:var(--A);}
.wsn.eb{color:var(--B);}

/* DUELO ANUNCIADO */
#s-duel{gap:13px;text-align:center;}
#s-duel.ea{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(74,144,226,.1) 0%,var(--dark) 70%);}
#s-duel.eb{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(255,51,51,.1) 0%,var(--dark) 70%);}
#s-duel.obs{background:var(--dark);}
.dt{font-family:'VT323',monospace;font-size:clamp(13px,4.3vw,19px);letter-spacing:10px;color:var(--pixel);animation:bk .6s step-end infinite;}
@keyframes bk{0%,100%{opacity:1;}50%{opacity:0;}}
.de{font-family:'VT323',monospace;font-size:clamp(12px,3.8vw,17px);letter-spacing:6px;opacity:.38;}
.dn{font-family:'Press Start 2P',monospace;font-size:clamp(15px,4.8vw,22px);line-height:1.4;}
.dn.ea{color:var(--A);}
.dn.eb{color:var(--B);}
.dr{font-family:'VT323',monospace;font-size:clamp(17px,5.3vw,24px);letter-spacing:4px;color:rgba(255,255,255,.65);margin-top:3px;}
.dmj{padding:12px 18px;border:2px solid rgba(57,255,20,.26);background:rgba(57,255,20,.04);width:100%;max-width:310px;text-align:center;margin-top:4px;}
.dmj-l{font-family:'VT323',monospace;font-size:12px;letter-spacing:8px;color:rgba(57,255,20,.32);margin-bottom:4px;}
.dmj-n{font-family:'Press Start 2P',monospace;font-size:clamp(10px,3.3vw,15px);color:var(--pixel);line-height:1.4;}
.dmj-i{font-family:'VT323',monospace;font-size:clamp(13px,4.3vw,18px);color:rgba(240,230,204,.44);margin-top:5px;letter-spacing:2px;}
.dw{font-family:'VT323',monospace;font-size:clamp(12px,4.2vw,17px);letter-spacing:5px;color:rgba(57,255,20,.32);animation:pulse 1.5s ease-in-out infinite;margin-top:5px;}

/* MINIJUEGO */
#s-mj{background:#000;}
.mj-w{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;width:100%;height:100%;padding:18px;}
.mj-l{font-family:'VT323',monospace;font-size:clamp(14px,4.8vw,20px);letter-spacing:5px;color:rgba(57,255,20,.48);text-align:center;}
.mj-r{font-family:'Press Start 2P',monospace;font-size:clamp(16px,5.5vw,26px);text-align:center;animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
.mj-r.win{color:var(--pixel);}
.mj-r.lose{color:var(--B);}
.mj-r.tie{color:var(--gold);}
.mj-timer{font-family:'VT323',monospace;font-size:clamp(44px,14vw,76px);color:var(--pixel);font-variant-numeric:tabular-nums;}

/* Botón grande */
.bbtn{width:min(230px,70vw);height:min(230px,70vw);border-radius:50%;font-family:'Press Start 2P',monospace;font-size:clamp(10px,3.3vw,15px);border:4px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.5;transition:transform .1s;padding:18px;}
.bbtn:active{transform:scale(.91);}
.green{background:rgba(57,255,20,.13);border-color:var(--pixel);color:var(--pixel);box-shadow:0 0 32px rgba(57,255,20,.26);}
.gold{background:rgba(201,168,76,.13);border-color:var(--gold);color:var(--gold);box-shadow:0 0 32px rgba(201,168,76,.26);}
.red{background:rgba(255,51,51,.13);border-color:var(--B);color:var(--B);}
.blue{background:rgba(74,144,226,.13);border-color:var(--A);color:var(--A);}
.flash{animation:fl2 .3s step-end infinite;}
@keyframes fl2{0%,100%{opacity:1;}50%{opacity:.3;}}

/* PPT */
.ppt-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;}
.pbt{padding:16px 7px;font-size:clamp(20px,6.5vw,34px);background:rgba(57,255,20,.07);border:2px solid rgba(57,255,20,.18);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .1s;}
.pbt:active{background:rgba(57,255,20,.18);transform:scale(.94);}
.pbt-l{font-family:'VT323',monospace;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.32);}
.pbt.sel{border-color:var(--pixel);background:rgba(57,255,20,.14);}

/* Pregunta */
.preg-t{font-family:'VT323',monospace;font-size:clamp(17px,5.3vw,25px);text-align:center;color:var(--cream);line-height:1.5;margin-bottom:7px;}
.preg-os{display:flex;flex-direction:column;gap:7px;width:100%;}
.preg-o{padding:12px;background:rgba(57,255,20,.05);border:1px solid rgba(57,255,20,.16);font-family:'Share Tech Mono',monospace;font-size:clamp(12px,3.8vw,16px);cursor:pointer;text-align:center;transition:all .1s;}
.preg-o:active{background:rgba(57,255,20,.14);}
.preg-o.ok{border-color:var(--pixel);background:rgba(57,255,20,.17);color:var(--pixel);}
.preg-o.ko{border-color:var(--B);background:rgba(255,51,51,.1);color:var(--B);}

/* Secuencia */
.seq-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(270px,78vw);}
.sqb{height:76px;border-radius:7px;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:11px;opacity:.28;transition:all .1s;}
.sqb.rc{background:rgba(255,51,51,.22);border-color:var(--B);color:var(--B);}
.sqb.bc{background:rgba(74,144,226,.22);border-color:var(--A);color:var(--A);}
.sqb.gc{background:rgba(57,255,20,.22);border-color:var(--pixel);color:var(--pixel);}
.sqb.yc{background:rgba(255,255,0,.22);border-color:#ffff00;color:#ffff00;}
.sqb.lit{opacity:1;transform:scale(1.04);}
.sqb:active{opacity:1;}

/* RESULTADO */
#s-res{gap:11px;text-align:center;}
.res-i{font-size:clamp(50px,15vw,76px);animation:fl 2s ease-in-out infinite;}
.res-t{font-family:'Press Start 2P',monospace;font-size:clamp(13px,4.2vw,20px);line-height:1.4;}
.res-t.win{color:var(--pixel);}
.res-t.lose{color:var(--B);}
.res-s{font-family:'VT323',monospace;font-size:clamp(13px,4.2vw,19px);letter-spacing:5px;color:rgba(255,255,255,.32);}
</style>
</head>
<body>

<!-- REGISTRO -->
<div class="scr on" id="s-reg">
  <div class="ri">🕹️</div>
  <div class="rt">RETRO<br>ARENA</div>
  <div class="rs">— GRADUACIÓN 2026 —</div>
  <input type="text" class="rinput" id="rname" placeholder="TU NOMBRE" maxlength="14" autocomplete="off" autocapitalize="words">
  <button class="rbtn" id="rbtn" onclick="registrarse()">UNIRME ▶</button>
  <div class="rerr" id="rerr"></div>
</div>

<!-- EQUIPO ASIGNADO -->
<div class="scr" id="s-eq">
  <div class="eq-lbl">HAS SIDO ASIGNADO A</div>
  <div class="eq-esc" id="eq-esc">🎮</div>
  <div class="eq-nm" id="eq-nm">EQUIPO AZUL</div>
  <div class="eq-desc" id="eq-desc">¡Lucha por tu equipo!</div>
</div>

<!-- ESPERA -->
<div class="scr" id="s-wait">
  <div class="wi" id="w-i">🔵</div>
  <div class="wn" id="w-n">—</div>
  <div class="wt" id="w-t">EQUIPO —</div>
  <div class="wst" id="w-st">Esperando al admin...</div>
  <div class="wsc">
    <div class="ws"><div class="wsl ea">AZUL</div><div class="wsn ea" id="mob-sa">0</div></div>
    <div class="ws"><div class="wsl eb">ROJO</div><div class="wsn eb" id="mob-sb">0</div></div>
  </div>
</div>

<!-- DUELO ANUNCIADO -->
<div class="scr" id="s-duel">
  <div class="dt">⚡ ¡DUELO! ⚡</div>
  <div class="de" id="d-e">ERES EL DUELISTA</div>
  <div class="dn" id="d-n">—</div>
  <div class="dr" id="d-r">VS —</div>
  <div class="dmj">
    <div class="dmj-l">— MINIJUEGO —</div>
    <div class="dmj-n" id="d-mjn">—</div>
    <div class="dmj-i" id="d-mji">—</div>
  </div>
  <div class="dw" id="d-w">Espera el conteo...</div>
</div>

<!-- MINIJUEGO -->
<div class="scr" id="s-mj">
  <div class="mj-w" id="mj-c"></div>
</div>

<!-- RESULTADO -->
<div class="scr" id="s-res">
  <div class="res-i" id="r-i">🏆</div>
  <div class="res-t" id="r-t">—</div>
  <div class="res-s" id="r-s">—</div>
</div>

<script>
const FC={apiKey:"AIzaSyAib6PDnV_u8GuDp-PnJvop91qv9JHfffc",authDomain:"impostor-322cc.firebaseapp.com",databaseURL:"https://impostor-322cc-default-rtdb.europe-west1.firebasedatabase.app",projectId:"impostor-322cc",storageBucket:"impostor-322cc.firebasestorage.app",messagingSenderId:"808449155212",appId:"1:808449155212:web:c32ca0565b083056f31ba9"};
firebase.initializeApp(FC);
const db=firebase.database(), RR=db.ref('retro');

const MJS={
  reflejos:{e:'⚡',n:'REFLEJOS DE ACERO',inst:'¡Pulsa el botón cuando se ponga VERDE!'},
  click:{e:'🖱️',n:'CLICK LOCO',inst:'El que más veces pulse en 10 segundos gana'},
  dado:{e:'🎲',n:'EL DADO MALDITO',inst:'Pulsa para tirar — el mayor número gana'},
  piedra:{e:'✂️',n:'PIEDRA PAPEL TIJERA',inst:'Elige en secreto — se revela a la vez'},
  pregunta:{e:'❓',n:'PREGUNTA RELÁMPAGO',inst:'El primero en acertar gana el punto'},
  memoria:{e:'🧠',n:'MEMORIA FLASH',inst:'Memoriza la secuencia y repítela sin fallar'},
  escalera:{e:'🪜',n:'ESCALERA DE BOTONES',inst:'Sigue la secuencia sin fallar'},
};

let myName='',myTeam='',myId='',isDuel=false,curMj='',duelA='',duelB='';

function scr(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}

document.getElementById('rname').addEventListener('keydown',e=>{if(e.key==='Enter')registrarse();});

function registrarse(){
  const n=document.getElementById('rname').value.trim();
  if(!n){err('Escribe tu nombre');return;}
  const btn=document.getElementById('rbtn');
  btn.textContent='...';btn.disabled=true;
  RR.child('jugadores').once('value').then(snap=>{
    const jugs=snap.val()||{};
    const total=Object.keys(jugs).length;
    const equipo=total%2===0?'A':'B';
    myName=n.toUpperCase();myTeam=equipo;
    const ref=RR.child('jugadores').push();
    myId=ref.key;
    return ref.set({nombre:myName,equipo:myTeam,ts:Date.now()});
  }).then(()=>{mostrarEquipo();initListener();})
  .catch(()=>{err('Error de conexión');btn.textContent='UNIRME ▶';btn.disabled=false;});
}
function err(m){const e=document.getElementById('rerr');e.textContent=m;setTimeout(()=>e.textContent='',2500);}

function mostrarEquipo(){
  const isA=myTeam==='A';
  const s=document.getElementById('s-eq');
  s.className='scr '+(isA?'ea':'eb');
  document.getElementById('eq-esc').textContent=isA?'🔵':'🔴';
  document.getElementById('eq-nm').textContent='EQUIPO '+(isA?'AZUL':'ROJO');
  document.getElementById('eq-nm').className='eq-nm '+(isA?'ea':'eb');
  document.getElementById('eq-desc').textContent=isA?'¡Lucha por el equipo Azul!':'¡Lucha por el equipo Rojo!';
  scr('s-eq');
  setTimeout(()=>irEspera(),2500);
}
function irEspera(){
  const isA=myTeam==='A';
  document.getElementById('w-i').textContent=isA?'🔵':'🔴';
  document.getElementById('w-n').textContent=myName;
  document.getElementById('w-n').className='wn '+(isA?'ea':'eb');
  document.getElementById('w-t').textContent='EQUIPO '+(isA?'AZUL':'ROJO');
  document.getElementById('w-t').className='wt '+(isA?'ea':'eb');
  scr('s-wait');
}

function initListener(){
  RR.on('value',snap=>{
    const d=snap.val();if(!d)return;
    if(d.scoreA!==undefined)document.getElementById('mob-sa').textContent=d.scoreA;
    if(d.scoreB!==undefined)document.getElementById('mob-sb').textContent=d.scoreB;
    if(!d.cmd)return;
    const cmd=d.cmd;

    if(cmd==='lobby'){irEspera();}
    else if(cmd==='duelo') onDuelo(d);
    else if(cmd==='conteo'||cmd==='jugando'){if(isDuel)lanzarMj(curMj);else{document.getElementById('w-st').textContent='Duelo en curso — mira la TV 📺';irEspera();}}
    else if(cmd==='ganador') onGanador(d);
    else if(cmd==='campeones') onCampeones(d);
  });
}

function onDuelo(d){
  curMj=d.minijuego||'reflejos';
  duelA=(d.jugadorA||'').toUpperCase();
  duelB=(d.jugadorB||'').toUpperCase();
  isDuel=(myName===duelA||myName===duelB);
  const isA_me=myName===duelA;
  const mj=MJS[curMj]||MJS.reflejos;
  document.getElementById('d-mjn').textContent=mj.e+' '+mj.n;
  document.getElementById('d-mji').textContent=mj.inst;
  const s=document.getElementById('s-duel');
  if(isDuel){
    const rival=isA_me?duelB:duelA;
    s.className='scr '+(myTeam==='A'?'ea':'eb');
    document.getElementById('d-e').textContent='¡TÚ DUELEAS!';
    document.getElementById('d-n').textContent=myName;
    document.getElementById('d-n').className='dn '+(myTeam==='A'?'ea':'eb');
    document.getElementById('d-r').textContent='VS '+rival;
    document.getElementById('d-w').textContent='Espera el conteo...';
  } else {
    s.className='scr obs';
    document.getElementById('d-e').textContent='DUELO EN CURSO';
    document.getElementById('d-n').textContent=duelA+' VS '+duelB;
    document.getElementById('d-n').className='dn';
    document.getElementById('d-r').textContent='';
    document.getElementById('d-w').textContent='Eres espectador — mira la TV 📺';
  }
  scr('s-duel');
}

function onGanador(d){
  const ganEq=d.ganadorEquipo,ganNm=(d.ganadorNombre||'').toUpperCase();
  const yo=ganNm===myName,miEq=ganEq===myTeam;
  document.getElementById('r-i').textContent=yo?'🏆':miEq?'🎉':'😤';
  document.getElementById('r-t').textContent=yo?'¡HAS GANADO!':miEq?'¡TU EQUIPO GANA!':'Han ganado ellos';
  document.getElementById('r-t').className='res-t '+(miEq?'win':'lose');
  document.getElementById('r-s').textContent=ganNm+' · EQ.'+(ganEq==='A'?'AZUL':'ROJO');
  scr('s-res');
  setTimeout(()=>irEspera(),4500);
}
function onCampeones(d){
  const miEq=d.campeonEquipo===myTeam;
  document.getElementById('r-i').textContent=miEq?'🏆':'🎖️';
  document.getElementById('r-t').textContent=miEq?'¡CAMPEONES!':'Buena batalla';
  document.getElementById('r-t').className='res-t '+(miEq?'win':'lose');
  document.getElementById('r-s').textContent='EQ.'+(d.campeonEquipo==='A'?'AZUL':'ROJO')+' GANA EL TORNEO';
  scr('s-res');
}

// ══════════════════════════════
// MINIJUEGOS AUTOMÁTICOS
// Cada uno al terminar llama a: declararGanador(equipo, nombre)
// ══════════════════════════════

// declararGanador escribe en Firebase y el listener de TV lo recoge
function declararGanador(eq,nm){
  // Solo el ganador (o el primero en llegar) lo escribe
  // Usamos transaction para evitar doble escritura
  const ronda=null; // se coge del estado en Firebase
  RR.child('resultadoPendiente').transaction(cur=>{
    if(cur!==null) return; // ya escrito por el rival
    return {ganadorEquipo:eq,ganadorNombre:nm,ts:Date.now()};
  });
}

function lanzarMj(id){
  scr('s-mj');
  const c=document.getElementById('mj-c');
  c.innerHTML='';
  if(id==='reflejos') mjReflejos(c);
  else if(id==='click') mjClick(c);
  else if(id==='dado') mjDado(c);
  else if(id==='piedra') mjPiedra(c);
  else if(id==='pregunta') mjPregunta(c);
  else if(id==='memoria') mjMemoria(c);
  else if(id==='escalera') mjEscalera(c);
}

// ── REFLEJOS ──
// El primero en pulsar cuando verde gana. Penalización si pulsa rojo.
function mjReflejos(c){
  let fase='espera',fired=false;
  const delay=1800+Math.random()*3200;
  c.innerHTML=`<div class="mj-l">¡PULSA CUANDO SEA VERDE!</div><button class="bbtn red flash" id="rb" onclick="rflP()">ESPERA...</button><div class="mj-r" id="rb-r" style="min-height:36px"></div>`;
  const btn=document.getElementById('rb');
  const res=document.getElementById('rb-r');
  const timer=setTimeout(()=>{
    if(fired) return;
    fase='verde';
    btn.className='bbtn green flash';
    btn.textContent='¡PULSA\nAHORA!';
  },delay);
  window.rflP=()=>{
    if(fired) return;
    if(fase==='espera'){
      clearTimeout(timer);
      fired=true;
      btn.className='bbtn red';btn.textContent='⛔ PRONTO';
      res.textContent='¡Demasiado pronto!';res.className='mj-r lose';
      // El rival gana por defecto si pulsé antes
      const rival=myName===duelA?duelB:duelA;
      const rivalEq=myName===duelA?'B':'A';
      declararGanador(rivalEq,rival);
    } else if(fase==='verde'){
      fired=true;
      btn.className='bbtn green';btn.textContent='✅ ¡PULSADO!';
      res.textContent='¡PRIMERO!';res.className='mj-r win';
      declararGanador(myTeam,myName);
    }
  };
  // Timeout: si nadie pulsa en 3s desde verde → empate → dado
  setTimeout(()=>{
    if(!fired&&fase==='verde'){
      fired=true;btn.className='bbtn gold';btn.textContent='TIEMPO';
      res.textContent='Empate → dado';res.className='mj-r tie';
      // Desempate por dado
      const rA=~~(Math.random()*6)+1,rB=~~(Math.random()*6)+1;
      if(rA>rB) declararGanador('A',duelA);
      else if(rB>rA) declararGanador('B',duelB);
      else declararGanador(Math.random()>.5?'A':'B',Math.random()>.5?duelA:duelB);
    }
  },delay+3000);
}

// ── CLICK LOCO ──
// Cada jugador pulsa 10s. Firebase acumula clicks de cada uno.
// Al acabar el tiempo, el que tenga más gana.
function mjClick(c){
  let count=0,t=10,done=false;
  c.innerHTML=`<div class="mj-l">¡PULSA LO MÁS RÁPIDO POSIBLE!</div><button class="bbtn green" id="cb" onclick="cbP()">0<br><span style="font-size:11px">CLICKS</span></button><div class="mj-timer" id="cb-t">10</div>`;
  const btn=document.getElementById('cb');
  const tel=document.getElementById('cb-t');
  // Guardar clicks de este jugador
  const mySlot=myName===duelA?'clicksA':'clicksB';
  const iv=setInterval(()=>{
    t--;tel.textContent=t;
    if(t<=3)tel.style.color='var(--B)';
    if(t<=0){
      clearInterval(iv);done=true;
      btn.innerHTML=count+'<br><span style="font-size:11px">CLICKS!</span>';
      btn.style.background='rgba(57,255,20,.25)';
      // Guardar mi resultado en Firebase
      RR.child('clickResults/'+mySlot).set(count);
    }
  },1000);
  window.cbP=()=>{if(done)return;count++;btn.innerHTML=count+'<br><span style="font-size:11px">CLICKS</span>';};
  // Listener: cuando ambos terminen, comparar
  RR.child('clickResults').on('value',snap=>{
    const r=snap.val();if(!r||!r.clicksA||!r.clicksB) return;
    RR.child('clickResults').off('value');
    RR.child('clickResults').remove();
    if(r.clicksA>r.clicksB) declararGanador('A',duelA);
    else if(r.clicksB>r.clicksA) declararGanador('B',duelB);
    else declararGanador(Math.random()>.5?'A':'B',Math.random()>.5?duelA:duelB);
  });
}

// ── DADO ──
// Cada jugador tira. El mayor gana. Firebase compara.
function mjDado(c){
  const D=['⚀','⚁','⚂','⚃','⚄','⚅'];let tirado=false;
  c.innerHTML=`<div class="mj-l">TIRA EL DADO</div><div style="font-size:clamp(70px,21vw,110px)" id="de">🎲</div><button class="bbtn gold" id="db" onclick="dadoT()">TIRAR</button><div class="mj-r" id="dr" style="min-height:28px"></div>`;
  window.dadoT=()=>{
    if(tirado)return;tirado=true;
    const btn=document.getElementById('db');btn.style.opacity='.4';
    const de=document.getElementById('de');
    const roll=setInterval(()=>de.textContent=D[~~(Math.random()*6)],80);
    setTimeout(()=>{
      clearInterval(roll);
      const r=~~(Math.random()*6)+1;
      de.textContent=D[r-1];
      document.getElementById('dr').textContent='Sacaste '+r+'!';
      const mySlot=myName===duelA?'dadoA':'dadoB';
      RR.child('dadoResults/'+mySlot).set(r);
    },1200);
  };
  RR.child('dadoResults').on('value',snap=>{
    const r=snap.val();if(!r||!r.dadoA||!r.dadoB)return;
    RR.child('dadoResults').off('value');
    RR.child('dadoResults').remove();
    if(r.dadoA>r.dadoB) declararGanador('A',duelA);
    else if(r.dadoB>r.dadoA) declararGanador('B',duelB);
    else{// empate: tirada extra automática
      const xA=~~(Math.random()*6)+1,xB=~~(Math.random()*6)+1;
      if(xA>=xB) declararGanador('A',duelA); else declararGanador('B',duelB);
    }
  });
}

// ── PIEDRA PAPEL TIJERA ──
// Cada jugador elige. Firebase compara.
function mjPiedra(c){
  let chosen=null;
  c.innerHTML=`<div class="mj-l">ELIGE TU MOVIMIENTO</div>
    <div class="ppt-g">
      <button class="pbt" id="pp-p" onclick="pptE('p')">🪨<div class="pbt-l">PIEDRA</div></button>
      <button class="pbt" id="pp-pa" onclick="pptE('pa')">📄<div class="pbt-l">PAPEL</div></button>
      <button class="pbt" id="pp-t" onclick="pptE('t')">✂️<div class="pbt-l">TIJERA</div></button>
    </div>
    <div class="mj-r" id="ppt-r" style="min-height:28px;font-size:clamp(12px,4vw,17px)">Elige en secreto</div>`;
  window.pptE=e=>{
    if(chosen)return;chosen=e;
    document.querySelectorAll('.pbt').forEach(b=>b.classList.remove('sel'));
    document.getElementById('pp-'+e).classList.add('sel');
    document.getElementById('ppt-r').textContent='Elegido ✅';
    const mySlot=myName===duelA?'pptA':'pptB';
    RR.child('pptResults/'+mySlot).set(e);
  };
  const beats={p:'t',pa:'p',t:'pa'}; // piedra gana tijera, papel gana piedra, tijera gana papel
  RR.child('pptResults').on('value',snap=>{
    const r=snap.val();if(!r||!r.pptA||!r.pptB)return;
    RR.child('pptResults').off('value');
    RR.child('pptResults').remove();
    const res=document.getElementById('ppt-r');
    if(r.pptA===r.pptB){res.textContent='¡EMPATE!';res.className='mj-r tie';
      // Empate: aleatoria
      setTimeout(()=>declararGanador(Math.random()>.5?'A':'B',Math.random()>.5?duelA:duelB),1000);
    } else if(beats[r.pptA]===r.pptB){res.textContent=myTeam==='A'?'¡TÚ GANAS!':'Gana el otro';res.className='mj-r '+(myTeam==='A'?'win':'lose');declararGanador('A',duelA);}
    else{res.textContent=myTeam==='B'?'¡TÚ GANAS!':'Gana el otro';res.className='mj-r '+(myTeam==='B'?'win':'lose');declararGanador('B',duelB);}
  });
}

// ── PREGUNTA RELÁMPAGO ──
// El primero en acertar gana. Escribe en Firebase.
const PREG=[
  {q:'¿Planetas del Sistema Solar?',o:['7','8','9','10'],a:1},
  {q:'¿Capital de Francia?',o:['Berlín','Madrid','París','Roma'],a:2},
  {q:'¿Año en que el hombre llegó a la Luna?',o:['1965','1967','1969','1972'],a:2},
  {q:'¿Lados de un hexágono?',o:['5','6','7','8'],a:1},
  {q:'¿Quién escribió El Quijote?',o:['Lope de Vega','Quevedo','Cervantes','Calderón'],a:2},
  {q:'¿Océano más grande del mundo?',o:['Atlántico','Índico','Ártico','Pacífico'],a:3},
  {q:'¿Cuántos colores tiene el arcoíris?',o:['5','6','7','8'],a:2},
  {q:'¿Metal más abundante en la Tierra?',o:['Hierro','Aluminio','Cobre','Oro'],a:0},
  {q:'¿En qué año acabó la II Guerra Mundial?',o:['1943','1944','1945','1946'],a:2},
  {q:'¿Huesos en el cuerpo humano adulto?',o:['186','206','226','246'],a:1},
  {q:'¿Cuántos continentes hay?',o:['5','6','7','8'],a:2},
  {q:'¿Cuál es el planeta más cercano al Sol?',o:['Venus','Marte','Mercurio','Tierra'],a:2},
];
function mjPregunta(c){
  const q=PREG[~~(Math.random()*PREG.length)];let answered=false;
  c.innerHTML=`<div class="preg-t">${q.q}</div><div class="preg-os">${q.o.map((o,i)=>`<button class="preg-o" id="po${i}" onclick="pregR(${i})">${o}</button>`).join('')}</div><div class="mj-r" id="pr" style="min-height:26px;margin-top:5px"></div>`;
  window.pregR=i=>{
    if(answered)return;answered=true;
    document.querySelectorAll('.preg-o').forEach((b,idx)=>{if(idx===q.a)b.classList.add('ok');else if(idx===i&&i!==q.a)b.classList.add('ko');});
    const res=document.getElementById('pr');
    if(i===q.a){
      res.textContent='✅ ¡CORRECTO!';res.className='mj-r win';
      declararGanador(myTeam,myName);
    } else {
      res.textContent='❌ Fallaste';res.className='mj-r lose';
      // El rival gana
      const rivalEq=myTeam==='A'?'B':'A';
      const rivalNm=myTeam==='A'?duelB:duelA;
      declararGanador(rivalEq,rivalNm);
    }
  };
  // Timeout 12s si nadie responde
  setTimeout(()=>{if(!answered){answered=true;document.getElementById('pr').textContent='⏱️ Tiempo agotado';declararGanador(Math.random()>.5?'A':'B',Math.random()>.5?duelA:duelB);}},12000);
}

// ── MEMORIA FLASH ──
// Sequence de 4. El que la completa sin fallar gana.
function mjMemoria(c){
  const COLS=['rc','bc','gc','yc'];const LABS=['🔴','🔵','🟢','🟡'];
  const LEN=4;const SEQ=[...Array(LEN)].map(()=>~~(Math.random()*4));
  let fase='mostrando',ps=[],failed=false;
  c.innerHTML=`<div class="mj-l" id="ml">Observa la secuencia...</div>
    <div class="seq-g">${COLS.map((col,i)=>`<button class="sqb ${col}" id="sq${i}" onclick="sqP(${i})">${LABS[i]}</button>`).join('')}</div>`;
  function ilum(idx,cb){const el=document.getElementById('sq'+idx);el.classList.add('lit');setTimeout(()=>{el.classList.remove('lit');setTimeout(cb,220);},550);}
  function mostrar(i){if(i>=SEQ.length){fase='jugando';document.getElementById('ml').textContent='¡Repítela!';return;}ilum(SEQ[i],()=>mostrar(i+1));}
  setTimeout(()=>mostrar(0),600);
  window.sqP=i=>{
    if(fase!=='jugando'||failed)return;
    const el=document.getElementById('sq'+i);el.classList.add('lit');setTimeout(()=>el.classList.remove('lit'),250);
    ps.push(i);
    if(i!==SEQ[ps.length-1]){
      failed=true;document.getElementById('ml').textContent='❌ Error';
      const rivalEq=myTeam==='A'?'B':'A';declararGanador(rivalEq,myTeam==='A'?duelB:duelA);
    } else if(ps.length===SEQ.length){
      document.getElementById('ml').textContent='✅ ¡Completada!';
      declararGanador(myTeam,myName);
    }
  };
  // Timeout 20s
  setTimeout(()=>{if(fase==='jugando'&&!failed){failed=true;document.getElementById('ml').textContent='⏱️ Tiempo';declararGanador(Math.random()>.5?'A':'B',Math.random()>.5?duelA:duelB);}},20000);
}

// ── ESCALERA DE BOTONES ──
// Sequence de 5 pulsaciones. El que la completa sin fallar gana.
function mjEscalera(c){
  const BS=[{l:'🔴',c:'red'},{l:'🔵',c:'blue'},{l:'🟢',c:'green'},{l:'🟡',c:'gold'}];
  const SEQ=[...Array(5)].map(()=>~~(Math.random()*4));
  let step=0,fail=false;
  c.innerHTML=`<div class="mj-l">Sigue: ${SEQ.map(i=>BS[i].l).join(' → ')}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(240px,73vw)">
      ${BS.map((b,i)=>`<button class="${b.c}" style="height:75px;border-radius:7px;font-size:28px;cursor:pointer;background:rgba(255,255,255,.06);border:3px solid rgba(255,255,255,.12)" onclick="escP(${i})">${b.l}</button>`).join('')}
    </div>
    <div class="mj-l" id="el">${step+1}/${SEQ.length}</div>`;
  window.escP=i=>{
    if(fail||step>=SEQ.length)return;
    const lbl=document.getElementById('el');
    if(i===SEQ[step]){step++;if(step>=SEQ.length){lbl.textContent='✅ ¡Completada!';declararGanador(myTeam,myName);}else lbl.textContent=(step+1)+'/'+SEQ.length;}
    else{fail=true;lbl.textContent='❌ Error en paso '+(step+1);const rivalEq=myTeam==='A'?'B':'A';declararGanador(rivalEq,myTeam==='A'?duelB:duelA);}
  };
  setTimeout(()=>{if(!fail&&step<SEQ.length){fail=true;document.getElementById('el').textContent='⏱️ Tiempo';declararGanador(Math.random()>.5?'A':'B',Math.random()>.5?duelA:duelB);}},18000);
}
</script>
