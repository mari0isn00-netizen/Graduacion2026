<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Duelos Retro</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--pixel:#39ff14;--gold:#c9a84c;--dark:#04050d;--cream:#f0e6cc;--A:#4a90e2;--B:#ff3333;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;background:var(--dark);color:var(--cream);font-family:'Share Tech Mono',monospace;overflow:hidden;touch-action:manipulation;}
.scr{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;text-align:center;}
.scr.on{display:flex;}

/* Registro */
#s-reg{background:var(--dark);}
.ri{font-size:clamp(46px,14vw,72px);animation:fl 2.5s ease-in-out infinite;}
@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.rt{font-family:'Press Start 2P',monospace;font-size:clamp(13px,4vw,20px);color:var(--pixel);text-shadow:0 0 16px rgba(57,255,20,.5);line-height:1.5;}
.rs{font-family:'VT323',monospace;font-size:clamp(15px,5vw,21px);letter-spacing:8px;color:rgba(57,255,20,.3);}
.rinput{width:100%;max-width:290px;background:rgba(57,255,20,.05);border:none;border-bottom:2px solid rgba(57,255,20,.28);color:var(--pixel);font-family:'Share Tech Mono',monospace;font-size:clamp(17px,5vw,23px);padding:12px 15px;text-align:center;letter-spacing:4px;outline:none;caret-color:var(--pixel);}
.rinput::placeholder{color:rgba(57,255,20,.16);}
.rinput:focus{border-color:var(--pixel);}
.rbtn{width:100%;max-width:290px;background:var(--pixel);color:#000;font-family:'Press Start 2P',monospace;font-size:clamp(11px,3.8vw,15px);padding:15px;border:none;cursor:pointer;letter-spacing:2px;}
.rbtn:active{transform:scale(.96);}
.rerr{color:var(--B);font-family:'VT323',monospace;font-size:17px;letter-spacing:4px;min-height:22px;}

/* Equipo */
#s-eq.ea{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(74,144,226,.12) 0%,var(--dark) 70%);}
#s-eq.eb{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(255,51,51,.12) 0%,var(--dark) 70%);}
.eq-esc{font-size:clamp(58px,18vw,90px);animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
.eq-nm{font-family:'Press Start 2P',monospace;font-size:clamp(20px,6.5vw,32px);}
.eq-nm.ea{color:var(--A);}
.eq-nm.eb{color:var(--B);}
.eq-sub{font-family:'VT323',monospace;font-size:clamp(13px,4.5vw,20px);letter-spacing:4px;opacity:.45;}
.lbl{font-family:'VT323',monospace;font-size:clamp(12px,4vw,18px);letter-spacing:6px;color:rgba(255,255,255,.28);}

/* Espera */
.wi{font-size:clamp(46px,14vw,72px);animation:fl 2.5s ease-in-out infinite;}
.wn{font-family:'Press Start 2P',monospace;font-size:clamp(13px,4vw,19px);line-height:1.4;}
.wn.ea{color:var(--A);}
.wn.eb{color:var(--B);}
.wt{font-family:'VT323',monospace;font-size:clamp(14px,4.8vw,20px);letter-spacing:8px;opacity:.35;}
.wt.ea{color:var(--A);}
.wt.eb{color:var(--B);}
.wst{font-family:'VT323',monospace;font-size:clamp(12px,4vw,17px);letter-spacing:5px;color:rgba(57,255,20,.38);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.28;}50%{opacity:1;}}
.wsc{display:flex;gap:18px;padding:9px 22px;border:1px solid rgba(255,255,255,.06);}
.ws{display:flex;flex-direction:column;align-items:center;gap:2px;}
.wsl{font-family:'VT323',monospace;font-size:12px;letter-spacing:4px;opacity:.35;}
.wsl.ea{color:var(--A);}
.wsl.eb{color:var(--B);}
.wsn{font-family:'Press Start 2P',monospace;font-size:clamp(20px,6.5vw,28px);}
.wsn.ea{color:var(--A);}
.wsn.eb{color:var(--B);}

/* Duelo */
#s-duel.ea{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(74,144,226,.1) 0%,var(--dark) 70%);}
#s-duel.eb{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(255,51,51,.1) 0%,var(--dark) 70%);}
#s-duel.obs{background:var(--dark);}
.dt{font-family:'VT323',monospace;font-size:clamp(13px,4.3vw,20px);letter-spacing:10px;color:var(--pixel);animation:bk .6s step-end infinite;}
@keyframes bk{0%,100%{opacity:1;}50%{opacity:0;}}
.dn{font-family:'Press Start 2P',monospace;font-size:clamp(14px,4.5vw,21px);line-height:1.4;}
.dn.ea{color:var(--A);}
.dn.eb{color:var(--B);}
.dr{font-family:'VT323',monospace;font-size:clamp(16px,5vw,23px);letter-spacing:4px;color:rgba(255,255,255,.6);}
.dmj{padding:12px 16px;border:2px solid rgba(57,255,20,.24);background:rgba(57,255,20,.04);width:100%;max-width:300px;}
.dmj-n{font-family:'Press Start 2P',monospace;font-size:clamp(10px,3.2vw,14px);color:var(--pixel);line-height:1.4;}
.dmj-i{font-family:'VT323',monospace;font-size:clamp(13px,4.2vw,18px);color:rgba(240,230,204,.42);margin-top:5px;letter-spacing:2px;}
.dw{font-family:'VT323',monospace;font-size:clamp(12px,4vw,17px);letter-spacing:5px;color:rgba(57,255,20,.3);animation:pulse 1.5s ease-in-out infinite;}

/* Minijuego */
#s-mj{background:#000;}
.mj-w{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;width:100%;height:100%;padding:18px;}
.mj-l{font-family:'VT323',monospace;font-size:clamp(14px,4.8vw,20px);letter-spacing:4px;color:rgba(57,255,20,.5);text-align:center;line-height:1.4;}
.mj-res{font-family:'Press Start 2P',monospace;font-size:clamp(14px,4.8vw,20px);text-align:center;min-height:30px;animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
.mj-res.win{color:var(--pixel);}
.mj-res.lose{color:var(--B);}
.mj-res.tie{color:var(--gold);}
.mj-timer{font-family:'VT323',monospace;font-size:clamp(52px,16vw,82px);color:var(--pixel);font-variant-numeric:tabular-nums;}

/* Botón gordo */
.bbtn{width:min(220px,68vw);height:min(220px,68vw);border-radius:50%;font-family:'Press Start 2P',monospace;font-size:clamp(10px,3.2vw,14px);border:4px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.5;padding:18px;transition:transform .08s;}
.bbtn:active{transform:scale(.88);}
.btn-red{background:rgba(255,51,51,.14);border-color:var(--B);color:var(--B);}
.btn-green{background:rgba(57,255,20,.14);border-color:var(--pixel);color:var(--pixel);box-shadow:0 0 28px rgba(57,255,20,.22);}
.btn-gold{background:rgba(201,168,76,.14);border-color:var(--gold);color:var(--gold);}
.flash{animation:fl2 .35s step-end infinite;}
@keyframes fl2{0%,100%{opacity:1;}50%{opacity:.2;}}

/* PPT */
.ppt-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;}
.pbt{padding:15px 6px;font-size:clamp(22px,7vw,36px);background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;border-radius:6px;transition:all .1s;}
.pbt:active{transform:scale(.93);}
.pbt-l{font-family:'VT323',monospace;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.3);}
.pbt.sel{border-color:var(--pixel);background:rgba(57,255,20,.12);}
.pbt.win-h{border-color:var(--pixel);background:rgba(57,255,20,.18);}
.pbt.lose-h{border-color:var(--B);background:rgba(255,51,51,.08);opacity:.45;}

/* Pregunta */
.preg-q{font-family:'VT323',monospace;font-size:clamp(18px,5.5vw,26px);color:var(--cream);line-height:1.5;}
.preg-opts{display:flex;flex-direction:column;gap:7px;width:100%;}
.preg-opt{padding:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);font-family:'Share Tech Mono',monospace;font-size:clamp(13px,4vw,17px);cursor:pointer;text-align:center;border-radius:4px;transition:all .1s;}
.preg-opt:active{background:rgba(255,255,255,.12);}
.preg-opt.ok{border-color:var(--pixel);background:rgba(57,255,20,.14);color:var(--pixel);}
.preg-opt.ko{border-color:var(--B);background:rgba(255,51,51,.1);color:var(--B);}

/* Memoria */
.seq-g{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(260px,76vw);}
.sqb{height:78px;border-radius:8px;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:28px;opacity:.28;transition:opacity .1s;}
.sqb.rc{background:rgba(255,51,51,.22);border-color:var(--B);}
.sqb.bc{background:rgba(74,144,226,.22);border-color:var(--A);}
.sqb.gc{background:rgba(57,255,20,.22);border-color:var(--pixel);}
.sqb.yc{background:rgba(255,210,0,.22);border-color:#ffd200;}
.sqb.lit{opacity:1;transform:scale(1.06);}
.sqb:active{opacity:.9;}

/* Precio */
.precio-img{font-size:clamp(58px,18vw,90px);line-height:1;}
.precio-q{font-family:'VT323',monospace;font-size:clamp(16px,5vw,24px);color:rgba(240,230,204,.7);letter-spacing:3px;}
.precio-inp{width:100%;max-width:250px;background:rgba(57,255,20,.05);border:none;border-bottom:2px solid rgba(57,255,20,.28);color:var(--pixel);font-family:'Press Start 2P',monospace;font-size:clamp(18px,6vw,26px);padding:11px 14px;text-align:center;outline:none;}
.precio-btn{width:100%;max-width:250px;background:var(--pixel);color:#000;font-family:'Press Start 2P',monospace;font-size:12px;padding:13px;border:none;cursor:pointer;}
.precio-btn:active{transform:scale(.96);}

/* Snake */
#snake-canvas{border:2px solid rgba(57,255,20,.4);background:#000;display:block;}
.snake-info{font-family:'VT323',monospace;font-size:clamp(15px,5vw,22px);letter-spacing:4px;color:rgba(57,255,20,.5);}
.snake-score{font-family:'Press Start 2P',monospace;font-size:clamp(18px,6vw,28px);color:var(--pixel);}

/* Dpad */
.dpad{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:4px;width:min(180px,55vw);height:min(180px,55vw);}
.dpad-btn{background:rgba(57,255,20,.1);border:2px solid rgba(57,255,20,.25);color:var(--pixel);font-size:clamp(16px,5vw,24px);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:background .1s;}
.dpad-btn:active{background:rgba(57,255,20,.3);}
.dpad-center{background:rgba(57,255,20,.04);}

/* Resultado */
#s-res{background:var(--dark);}
.res-i{font-size:clamp(50px,15vw,76px);animation:fl 2s ease-in-out infinite;}
.res-t{font-family:'Press Start 2P',monospace;font-size:clamp(13px,4.2vw,20px);line-height:1.4;}
.res-t.win{color:var(--pixel);}
.res-t.lose{color:var(--B);}
.res-s{font-family:'VT323',monospace;font-size:clamp(13px,4.2vw,19px);letter-spacing:5px;color:rgba(255,255,255,.3);}
</style>
</head>
<body>

<div class="scr on" id="s-reg">
  <div class="ri">🕹️</div>
  <div class="rt">RETRO<br>ARENA</div>
  <div class="rs">— GRADUACIÓN 2026 —</div>
  <input type="text" class="rinput" id="rname" placeholder="TU NOMBRE" maxlength="14" autocomplete="off" autocapitalize="words">
  <button class="rbtn" id="rbtn" onclick="registrarse()">UNIRME ▶</button>
  <div class="rerr" id="rerr"></div>
</div>

<div class="scr" id="s-eq">
  <div class="lbl">HAS SIDO ASIGNADO A</div>
  <div class="eq-esc" id="eq-esc">🎮</div>
  <div class="eq-nm" id="eq-nm">EQUIPO AZUL</div>
  <div class="eq-sub" id="eq-sub">¡Lucha por tu equipo!</div>
</div>

<div class="scr" id="s-wait">
  <div class="wi" id="w-i">🔵</div>
  <div class="wn" id="w-n">—</div>
  <div class="wt" id="w-t">EQUIPO —</div>
  <div class="wst" id="w-st">Esperando al admin...</div>
  <div class="wsc">
    <div class="ws"><div class="wsl ea">AZUL</div><div class="wsn ea" id="mob-sa">0</div></div>
    <div class="ws"><div class="wsl eb">ROJO</div><div class="wsn eb" id="mob-sb">0</div></div>
  </div>
</div>

<div class="scr" id="s-duel">
  <div class="dt">⚡ ¡DUELO! ⚡</div>
  <div class="lbl" id="d-e">ERES EL DUELISTA</div>
  <div class="dn" id="d-n">—</div>
  <div class="dr" id="d-r">—</div>
  <div class="dmj">
    <div class="dmj-n" id="d-mjn">—</div>
    <div class="dmj-i" id="d-mji">—</div>
  </div>
  <div class="dw" id="d-w">Espera el conteo...</div>
</div>

<div class="scr" id="s-mj">
  <div class="mj-w" id="mj-c"></div>
</div>

<div class="scr" id="s-res">
  <div class="res-i" id="r-i">🏆</div>
  <div class="res-t" id="r-t">—</div>
  <div class="res-s" id="r-s">—</div>
</div>

<script>
const FC={apiKey:"AIzaSyAib6PDnV_u8GuDp-PnJvop91qv9JHfffc",authDomain:"impostor-322cc.firebaseapp.com",databaseURL:"https://impostor-322cc-default-rtdb.europe-west1.firebasedatabase.app",projectId:"impostor-322cc",storageBucket:"impostor-322cc.firebasestorage.app",messagingSenderId:"808449155212",appId:"1:808449155212:web:c32ca0565b083056f31ba9"};
firebase.initializeApp(FC);
const db=firebase.database(), RR=db.ref('retro');

const MJS={
  reflejos:{e:'⚡',n:'REFLEJOS DE ACERO',inst:'¡Pulsa cuando se ponga VERDE! El más rápido gana'},
  click:{e:'🖱️',n:'CLICK LOCO',inst:'El que más veces pulse en 10 segundos gana'},
  dado:{e:'🎲',n:'EL DADO MALDITO',inst:'Tira el dado — el mayor número gana'},
  piedra:{e:'✂️',n:'PIEDRA PAPEL TIJERA',inst:'Elige en secreto — se revela a la vez'},
  pregunta:{e:'❓',n:'PREGUNTA RELÁMPAGO',inst:'El primero en acertar gana — ¡un error y pierde!'},
  memoria:{e:'🧠',n:'MEMORIA FLASH',inst:'Misma secuencia para los dos — primero en completarla gana'},
  moneda:{e:'🪙',n:'CARA O CRUZ',inst:'Elige antes del lanzamiento — suerte pura'},
  precio:{e:'💰',n:'ADIVINA EL PRECIO',inst:'¿Cuánto cuesta? El que más se acerque gana'},
  snake:{e:'🐍',n:'SNAKE RETRO',inst:'Mueve la serpiente y come manzanas — ¡más puntos gana!'},
};

let myName='',myTeam='',myId='',isDuel=false,curMj='',duelA='',duelB='';

// Limpieza de listeners activos de Firebase entre rondas
let activeOff=[];
function offAll(){activeOff.forEach(f=>f());activeOff=[];}
function watch(ref,fn){ref.on('value',fn);activeOff.push(()=>ref.off('value',fn));}

function scr(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}

// ── REGISTRO ──
document.getElementById('rname').addEventListener('keydown',e=>{if(e.key==='Enter')registrarse();});
function registrarse(){
  const n=document.getElementById('rname').value.trim();
  if(!n){showErr('Escribe tu nombre');return;}
  const btn=document.getElementById('rbtn');btn.textContent='...';btn.disabled=true;
  RR.child('jugadores').once('value').then(snap=>{
    const jugs=snap.val()||{};
    myTeam=Object.keys(jugs).length%2===0?'A':'B';
    myName=n.toUpperCase();
    const ref=RR.child('jugadores').push();
    myId=ref.key;
    return ref.set({nombre:myName,equipo:myTeam,ts:Date.now()});
  }).then(()=>{mostrarEquipo();initListener();})
  .catch(()=>{showErr('Error de conexión');btn.textContent='UNIRME ▶';btn.disabled=false;});
}
function showErr(m){const e=document.getElementById('rerr');e.textContent=m;setTimeout(()=>e.textContent='',2500);}

function mostrarEquipo(){
  const isA=myTeam==='A';
  document.getElementById('s-eq').className='scr '+(isA?'ea':'eb');
  document.getElementById('eq-esc').textContent=isA?'🔵':'🔴';
  document.getElementById('eq-nm').textContent='EQUIPO '+(isA?'AZUL':'ROJO');
  document.getElementById('eq-nm').className='eq-nm '+(isA?'ea':'eb');
  document.getElementById('eq-sub').textContent=isA?'¡Lucha por el equipo Azul!':'¡Lucha por el equipo Rojo!';
  scr('s-eq');setTimeout(()=>irEspera(),2500);
}
function irEspera(){
  const isA=myTeam==='A';
  offAll();
  document.getElementById('w-i').textContent=isA?'🔵':'🔴';
  document.getElementById('w-n').textContent=myName;
  document.getElementById('w-n').className='wn '+(isA?'ea':'eb');
  document.getElementById('w-t').textContent='EQUIPO '+(isA?'AZUL':'ROJO');
  document.getElementById('w-t').className='wt '+(isA?'ea':'eb');
  document.getElementById('w-st').textContent='Esperando al admin...';
  scr('s-wait');
}

// ── LISTENER PRINCIPAL ──
function initListener(){
  RR.on('value',snap=>{
    const d=snap.val();if(!d)return;
    if(d.scoreA!==undefined)document.getElementById('mob-sa').textContent=d.scoreA;
    if(d.scoreB!==undefined)document.getElementById('mob-sb').textContent=d.scoreB;
    if(!d.cmd)return;
    const cmd=d.cmd;
    if(cmd==='lobby'){irEspera();}
    else if(cmd==='duelo'){onDuelo(d);}
    else if(cmd==='conteo'||cmd==='jugando'){isDuel?(scr('s-mj'),lanzarMj(curMj)):(document.getElementById('w-st').textContent='Duelo en curso — mira la TV 📺',scr('s-wait'));}
    else if(cmd==='ganador'){onGanador(d);}
    else if(cmd==='campeones'){onCampeones(d);}
  });
}

function onDuelo(d){
  offAll();
  curMj=d.minijuego||'reflejos';
  duelA=(d.jugadorA||'').toUpperCase();
  duelB=(d.jugadorB||'').toUpperCase();
  isDuel=myName===duelA||myName===duelB;
  const mj=MJS[curMj]||MJS.reflejos;
  document.getElementById('d-mjn').textContent=mj.e+' '+mj.n;
  document.getElementById('d-mji').textContent=mj.inst;
  const s=document.getElementById('s-duel');
  if(isDuel){
    const rival=myName===duelA?duelB:duelA;
    s.className='scr '+(myTeam==='A'?'ea':'eb');
    document.getElementById('d-e').textContent='¡TÚ DUELEAS!';
    document.getElementById('d-n').textContent=myName;
    document.getElementById('d-n').className='dn '+(myTeam==='A'?'ea':'eb');
    document.getElementById('d-r').textContent='VS '+rival;
    document.getElementById('d-w').textContent='Espera el conteo...';
  } else {
    s.className='scr obs';
    document.getElementById('d-e').textContent='DUELO EN CURSO';
    document.getElementById('d-n').textContent=duelA+' VS '+duelB;
    document.getElementById('d-n').className='dn';
    document.getElementById('d-r').textContent='';
    document.getElementById('d-w').textContent='Eres espectador — mira la TV 📺';
  }
  scr('s-duel');
}

function onGanador(d){
  const ganEq=d.ganadorEquipo,ganNm=(d.ganadorNombre||'').toUpperCase();
  const yo=ganNm===myName,miEq=ganEq===myTeam;
  document.getElementById('r-i').textContent=yo?'🏆':miEq?'🎉':'😤';
  document.getElementById('r-t').textContent=yo?'¡HAS GANADO!':miEq?'¡TU EQUIPO GANA!':'Han ganado ellos';
  document.getElementById('r-t').className='res-t '+(miEq?'win':'lose');
  document.getElementById('r-s').textContent=ganNm+' · EQ.'+(ganEq==='A'?'AZUL':'ROJO');
  scr('s-res');setTimeout(()=>irEspera(),4500);
}
function onCampeones(d){
  offAll();
  const miEq=d.campeonEquipo===myTeam;
  document.getElementById('r-i').textContent=miEq?'🏆':'🎖️';
  document.getElementById('r-t').textContent=miEq?'¡CAMPEONES!':'Buena batalla';
  document.getElementById('r-t').className='res-t '+(miEq?'win':'lose');
  document.getElementById('r-s').textContent='EQ.'+(d.campeonEquipo==='A'?'AZUL':'ROJO')+' GANA EL TORNEO';
  scr('s-res');
}

// ══════════════════════════════════════════════════
// SISTEMA DE RESULTADO
// Cada juego llama a ganar()/perder() según quién gana.
// ganar() solo escribe si nadie ha escrito ya (one-shot).
// ══════════════════════════════════════════════════
let mjDone=false;
function lanzarMj(id){
  mjDone=false;offAll();
  const c=document.getElementById('mj-c');c.innerHTML='';

}
function ganar(){

function dueloFB(nodo,miValor,comparador,display){
  const slot=myName===duelA?'a':'b';
  RR.child(nodo).remove().then(()=>{
    RR.child(nodo+'/'+slot).set(miValor);
  });
  const fn=snap=>{
    const r=snap.val();
    if(!r||r.a===undefined||r.b===undefined)return;
    RR.child(nodo).off('value',fn);
    activeOff=activeOff.filter(f2=>{
      // quitar este específico
      try{RR.child(nodo).off('value',fn);}catch(e){}
      return false; // limpia todos de este nodo
    });
    RR.child(nodo).remove();
    const ganador=comparador(r.a,r.b);

// 1. REFLEJOS — seed compartido para delay igual en ambos
// ══════════════════════════════════════════════════
function mjReflejos(c){
  let fase='espera',done=false;
  c.innerHTML=`<div class="mj-l">¡ESPERA... LUEGO PULSA!</div>
    <button id="rb" class="bbtn btn-red flash" onclick="rflP()">ESPERA</button>
    <div class="mj-res" id="rr"></div>`;
  const btn=document.getElementById('rb');
  const rr=document.getElementById('rr');
  // Seed: usar rondaTs para delay idéntico en ambos móviles
  RR.child('rondaTs').once('value').then(snap=>{
    const seed=Number(snap.val())||Date.now();
    // LCG determinista → número entre 0 y 1
    const rng=((seed*1664525+1013904223)>>>0)/4294967296;
    const delay=2000+Math.floor(rng*3000); // 2-5s, igual para ambos
    const tGreen=setTimeout(()=>{
      if(done)return;fase='verde';
      btn.className='bbtn btn-green flash';btn.textContent='¡PULSA!';
    },delay);
    const tOut=setTimeout(()=>{
      if(!done&&fase==='verde'){done=true;clearTimeout(tGreen);
        btn.textContent='😴';rr.textContent='Tiempo';rr.className='mj-res tie';aleatorio();}
    },delay+4000);
    window._rflT=[tGreen,tOut];
    window.rflP=()=>{
      if(done)return;done=true;clearTimeout(tGreen);clearTimeout(tOut);
      if(fase==='espera'){btn.textContent='⛔';rr.textContent='¡DEMASIADO PRONTO!';rr.className='mj-res lose';perder();}
      else{btn.classList.remove('flash');btn.textContent='✅';rr.textContent='¡PRIMERO!';rr.className='mj-res win';ganar();}
    };
  });
}

// 9. SNAKE RETRO — juego real 30s, más puntos gana
// ══════════════════════════════════════════════════
function mjSnake(c){
  const W=10,SZ=24,TICK=150;
  let snake=[{x:5,y:5}],dir={x:1,y:0},food={},score=0,alive=true,iv=null;
  const slot=myName===duelA?'a':'b';
  RR.child('snakeR').remove();
  c.innerHTML=`
    <div class="snake-info">🐍 30 SEG — MÁS PUNTOS GANA</div>
    <canvas id="snake-canvas" width="${W*SZ}" height="${W*SZ}"></canvas>
    <div class="snake-score" id="sscore">0 🍎</div>
    <div class="dpad">
      <div></div><button class="dpad-btn" onclick="sDir(0,-1)">▲</button><div></div>
      <button class="dpad-btn" onclick="sDir(-1,0)">◀</button><div class="dpad-center"></div><button class="dpad-btn" onclick="sDir(1,0)">▶</button>
      <div></div><button class="dpad-btn" onclick="sDir(0,1)">▼</button><div></div>
    </div>`;
  const canvas=document.getElementById('snake-canvas');
  const ctx=canvas.getContext('2d');
  const rndFood=()=>({x:~~(Math.random()*W),y:~~(Math.random()*W)});
  food=rndFood();
  function draw(){
    ctx.fillStyle='#000';ctx.fillRect(0,0,W*SZ,W*SZ);
    ctx.fillStyle='#ff3333';ctx.fillRect(food.x*SZ+2,food.y*SZ+2,SZ-4,SZ-4);
    snake.forEach((s,i)=>{ctx.fillStyle=i===0?'var(--pixel)':'#22aa22';ctx.fillRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2);});
  }
  function step(){
    if(!alive)return;
    const head={x:(snake[0].x+dir.x+W)%W,y:(snake[0].y+dir.y+W)%W};
    if(snake.some(s=>s.x===head.x&&s.y===head.y)){alive=false;clearInterval(iv);fin();return;}
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){score++;document.getElementById('sscore').textContent=score+' 🍎';food=rndFood();}
    else snake.pop();
    draw();
  }
  window.sDir=(dx,dy)=>{
    if(dx===0&&dy===0)return;
    if(dx!==-dir.x&&dy!==-dir.y)dir={x:dx,y:dy};
  };
  // Controles teclado también
  document.onkeydown=e=>{const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};const d=m[e.key];if(d)sDir(...d);};
  draw();
  iv=setInterval(step,TICK);
  // Fin por tiempo (30s) o muerte
  const tEnd=setTimeout(fin,30000);
  function fin(){
    clearInterval(iv);clearTimeout(tEnd);alive=false;
    document.getElementById('sscore').textContent='✅ '+score+' puntos';
    RR.child('snakeR/'+slot).set(score);
  }
  const fn=snap=>{
    const r=snap.val();if(!r||r.a===undefined||r.b===undefined)return;
    RR.child('snakeR').off('value',fn);RR.child('snakeR').remove();
    if(r.a>r.b)myTeam==='A'?ganar():perder();
    else if(r.b>r.a)myTeam==='B'?ganar():perder();
    else aleatorio();
  };
  watch(RR.child('snakeR'),fn);
}
</script>
</body>
</html>
