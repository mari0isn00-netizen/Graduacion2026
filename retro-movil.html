<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Duelos Retro — Móvil</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--pixel:#39ff14;--gold:#c9a84c;--dark:#04050d;--cream:#f0e6cc;--A:#4a90e2;--B:#ff3333;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;background:var(--dark);color:var(--cream);font-family:'Share Tech Mono',monospace;overflow:hidden;touch-action:manipulation;}
.scr{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:22px;}
.scr.on{display:flex;}

/* ── REGISTRO ── */
#s-reg{gap:18px;text-align:center;}
.ri{font-size:clamp(46px,14vw,70px);animation:fl 2.5s ease-in-out infinite;}
@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.rt{font-family:'Press Start 2P',monospace;font-size:clamp(13px,4.2vw,20px);color:var(--pixel);text-shadow:0 0 18px rgba(57,255,20,.5);line-height:1.5;}
.rs{font-family:'VT323',monospace;font-size:clamp(15px,5vw,21px);letter-spacing:8px;color:rgba(57,255,20,.32);margin-top:-6px;}
.rinput{width:100%;max-width:290px;background:rgba(57,255,20,.05);border:none;border-bottom:2px solid rgba(57,255,20,.28);color:var(--pixel);font-family:'Share Tech Mono',monospace;font-size:clamp(17px,5vw,23px);padding:13px 16px;text-align:center;letter-spacing:4px;outline:none;caret-color:var(--pixel);}
.rinput::placeholder{color:rgba(57,255,20,.18);}
.rinput:focus{border-color:var(--pixel);}
.rbtn{width:100%;max-width:290px;background:var(--pixel);color:#000;font-family:'Press Start 2P',monospace;font-size:clamp(11px,3.8vw,15px);padding:15px;border:none;cursor:pointer;letter-spacing:2px;}
.rbtn:active{transform:scale(.97);opacity:.85;}
.rerr{color:var(--B);font-family:'VT323',monospace;font-size:17px;letter-spacing:4px;min-height:22px;text-align:center;}

/* ── EQUIPO ── */
#s-eq{gap:13px;text-align:center;}
#s-eq.ea{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(74,144,226,.12) 0%,var(--dark) 70%);}
#s-eq.eb{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(255,51,51,.12) 0%,var(--dark) 70%);}
.eq-lbl{font-family:'VT323',monospace;font-size:clamp(12px,4vw,17px);letter-spacing:8px;color:rgba(255,255,255,.28);}
.eq-esc{font-size:clamp(58px,17vw,86px);animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
.eq-nm{font-family:'Press Start 2P',monospace;font-size:clamp(20px,6.5vw,32px);line-height:1.2;}
.eq-nm.ea{color:var(--A);text-shadow:0 0 28px rgba(74,144,226,.55);}
.eq-nm.eb{color:var(--B);text-shadow:0 0 28px rgba(255,51,51,.55);}
.eq-desc{font-family:'VT323',monospace;font-size:clamp(13px,4.2vw,19px);letter-spacing:4px;opacity:.45;}

/* ── ESPERA ── */
#s-wait{gap:13px;text-align:center;}
.wi{font-size:clamp(46px,14vw,70px);animation:fl 2.5s ease-in-out infinite;}
.wn{font-family:'Press Start 2P',monospace;font-size:clamp(13px,4.2vw,19px);line-height:1.4;}
.wn.ea{color:var(--A);}
.wn.eb{color:var(--B);}
.wt{font-family:'VT323',monospace;font-size:clamp(14px,4.8vw,20px);letter-spacing:8px;opacity:.38;margin-top:2px;}
.wt.ea{color:var(--A);}
.wt.eb{color:var(--B);}
.wst{font-family:'VT323',monospace;font-size:clamp(12px,4.2vw,17px);letter-spacing:5px;color:rgba(57,255,20,.38);animation:pulse 2s ease-in-out infinite;margin-top:7px;}
@keyframes pulse{0%,100%{opacity:.32;}50%{opacity:1;}}
.wsc{display:flex;gap:18px;margin-top:10px;padding:9px 22px;border:1px solid rgba(255,255,255,.06);}
.ws{display:flex;flex-direction:column;align-items:center;gap:2px;}
.wsl{font-family:'VT323',monospace;font-size:12px;letter-spacing:4px;opacity:.38;}
.wsl.ea{color:var(--A);}
.wsl.eb{color:var(--B);}
.wsn{font-family:'Press Start 2P',monospace;font-size:clamp(20px,6.5vw,28px);}
.wsn.ea{color:var(--A);}
.wsn.eb{color:var(--B);}

/* ── DUELO ── */
#s-duel{gap:13px;text-align:center;}
#s-duel.ea{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(74,144,226,.1) 0%,var(--dark) 70%);}
#s-duel.eb{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(255,51,51,.1) 0%,var(--dark) 70%);}
#s-duel.obs{background:var(--dark);}
.dt{font-family:'VT323',monospace;font-size:clamp(13px,4.3vw,19px);letter-spacing:10px;color:var(--pixel);animation:bk .6s step-end infinite;}
@keyframes bk{0%,100%{opacity:1;}50%{opacity:0;}}
.de{font-family:'VT323',monospace;font-size:clamp(12px,3.8vw,17px);letter-spacing:6px;opacity:.38;}
.dn{font-family:'Press Start 2P',monospace;font-size:clamp(15px,4.8vw,22px);line-height:1.4;}
.dn.ea{color:var(--A);}
.dn.eb{color:var(--B);}
.dr{font-family:'VT323',monospace;font-size:clamp(17px,5.3vw,24px);letter-spacing:4px;color:rgba(255,255,255,.6);margin-top:3px;}
.dmj{padding:12px 18px;border:2px solid rgba(57,255,20,.25);background:rgba(57,255,20,.04);width:100%;max-width:310px;text-align:center;}
.dmj-l{font-family:'VT323',monospace;font-size:12px;letter-spacing:8px;color:rgba(57,255,20,.3);margin-bottom:4px;}
.dmj-n{font-family:'Press Start 2P',monospace;font-size:clamp(10px,3.3vw,15px);color:var(--pixel);line-height:1.4;}
.dmj-i{font-family:'VT323',monospace;font-size:clamp(13px,4.3vw,18px);color:rgba(240,230,204,.42);margin-top:5px;letter-spacing:2px;}
.dw{font-family:'VT323',monospace;font-size:clamp(12px,4.2vw,17px);letter-spacing:5px;color:rgba(57,255,20,.3);animation:pulse 1.5s ease-in-out infinite;}

/* ── MINIJUEGO ── */
#s-mj{background:#000;}
.mj-w{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;width:100%;height:100%;padding:18px;}
.mj-l{font-family:'VT323',monospace;font-size:clamp(14px,4.8vw,20px);letter-spacing:4px;color:rgba(57,255,20,.5);text-align:center;line-height:1.4;}

/* Botón gordo redondo */
.bbtn{width:min(220px,68vw);height:min(220px,68vw);border-radius:50%;font-family:'Press Start 2P',monospace;font-size:clamp(10px,3.2vw,14px);border:4px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.6;transition:transform .08s,background .2s;padding:18px;}
.bbtn:active{transform:scale(.88);}
.btn-red{background:rgba(255,51,51,.14);border-color:var(--B);color:var(--B);}
.btn-green{background:rgba(57,255,20,.14);border-color:var(--pixel);color:var(--pixel);box-shadow:0 0 30px rgba(57,255,20,.25);}
.btn-gold{background:rgba(201,168,76,.14);border-color:var(--gold);color:var(--gold);}
.flash{animation:fl2 .35s step-end infinite;}
@keyframes fl2{0%,100%{opacity:1;}50%{opacity:.25;}}
.mj-res{font-family:'Press Start 2P',monospace;font-size:clamp(15px,5vw,22px);text-align:center;animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
.mj-res.win{color:var(--pixel);}
.mj-res.lose{color:var(--B);}
.mj-res.tie{color:var(--gold);}
.mj-timer{font-family:'VT323',monospace;font-size:clamp(52px,16vw,80px);color:var(--pixel);font-variant-numeric:tabular-nums;}

/* PPT */
.ppt-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;}
.pbt{padding:15px 6px;font-size:clamp(22px,7vw,36px);background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;border-radius:6px;transition:all .1s;}
.pbt:active{transform:scale(.93);}
.pbt-l{font-family:'VT323',monospace;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.3);}
.pbt.sel{border-color:var(--pixel);background:rgba(57,255,20,.12);}
.pbt.win-h{border-color:var(--pixel);background:rgba(57,255,20,.18);}
.pbt.lose-h{border-color:var(--B);background:rgba(255,51,51,.1);opacity:.5;}

/* Pregunta */
.preg-q{font-family:'VT323',monospace;font-size:clamp(18px,5.5vw,26px);text-align:center;color:var(--cream);line-height:1.5;margin-bottom:8px;}
.preg-opts{display:flex;flex-direction:column;gap:7px;width:100%;}
.preg-opt{padding:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);font-family:'Share Tech Mono',monospace;font-size:clamp(13px,4vw,17px);cursor:pointer;text-align:center;border-radius:4px;transition:all .1s;}
.preg-opt:active{background:rgba(255,255,255,.12);}
.preg-opt.ok{border-color:var(--pixel);background:rgba(57,255,20,.15);color:var(--pixel);}
.preg-opt.ko{border-color:var(--B);background:rgba(255,51,51,.1);color:var(--B);}
.preg-opt:disabled{pointer-events:none;}

/* Secuencia colores */
.seq-g{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(260px,76vw);}
.sqb{height:80px;border-radius:8px;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:28px;opacity:.3;transition:opacity .1s,transform .1s;}
.sqb.rc{background:rgba(255,51,51,.25);border-color:var(--B);}
.sqb.bc{background:rgba(74,144,226,.25);border-color:var(--A);}
.sqb.gc{background:rgba(57,255,20,.25);border-color:var(--pixel);}
.sqb.yc{background:rgba(255,220,0,.25);border-color:#ffdd00;}
.sqb.lit{opacity:1;transform:scale(1.06);}
.sqb:active{opacity:1;}
.seq-prog{font-family:'VT323',monospace;font-size:clamp(14px,4.5vw,20px);letter-spacing:4px;color:rgba(255,255,255,.4);text-align:center;}

/* Precio */
.precio-img{font-size:clamp(56px,17vw,90px);line-height:1;}
.precio-q{font-family:'VT323',monospace;font-size:clamp(16px,5vw,23px);text-align:center;color:rgba(240,230,204,.7);letter-spacing:3px;}
.precio-input{width:100%;max-width:260px;background:rgba(57,255,20,.06);border:none;border-bottom:2px solid rgba(57,255,20,.3);color:var(--pixel);font-family:'Press Start 2P',monospace;font-size:clamp(18px,6vw,26px);padding:12px 16px;text-align:center;outline:none;caret-color:var(--pixel);}
.precio-input::placeholder{color:rgba(57,255,20,.18);}
.precio-btn{width:100%;max-width:260px;background:var(--pixel);color:#000;font-family:'Press Start 2P',monospace;font-size:12px;padding:13px;border:none;cursor:pointer;}
.precio-btn:active{transform:scale(.96);}
.precio-res{font-family:'VT323',monospace;font-size:clamp(15px,4.8vw,21px);letter-spacing:4px;text-align:center;min-height:24px;}

/* Cara o cruz */
.moneda{font-size:clamp(80px,24vw,120px);cursor:pointer;animation:spin3d 0s ease-in-out;display:block;line-height:1;}
@keyframes spin3d{0%{transform:rotateY(0deg);}100%{transform:rotateY(1800deg);}}
.moneda.girando{animation:spin3d 1.5s ease-in-out forwards;}

/* Resultado final */
#s-res{gap:11px;text-align:center;}
.res-i{font-size:clamp(50px,15vw,76px);animation:fl 2s ease-in-out infinite;}
.res-t{font-family:'Press Start 2P',monospace;font-size:clamp(13px,4.2vw,20px);line-height:1.4;}
.res-t.win{color:var(--pixel);}
.res-t.lose{color:var(--B);}
.res-s{font-family:'VT323',monospace;font-size:clamp(13px,4.2vw,19px);letter-spacing:5px;color:rgba(255,255,255,.3);}
</style>
</head>
<body>

<div class="scr on" id="s-reg">
  <div class="ri">🕹️</div>
  <div class="rt">RETRO<br>ARENA</div>
  <div class="rs">— GRADUACIÓN 2026 —</div>
  <input type="text" class="rinput" id="rname" placeholder="TU NOMBRE" maxlength="14" autocomplete="off" autocapitalize="words">
  <button class="rbtn" id="rbtn" onclick="registrarse()">UNIRME ▶</button>
  <div class="rerr" id="rerr"></div>
</div>

<div class="scr" id="s-eq">
  <div class="eq-lbl">HAS SIDO ASIGNADO A</div>
  <div class="eq-esc" id="eq-esc">🎮</div>
  <div class="eq-nm" id="eq-nm">EQUIPO AZUL</div>
  <div class="eq-desc" id="eq-desc">¡Lucha por tu equipo!</div>
</div>

<div class="scr" id="s-wait">
  <div class="wi" id="w-i">🔵</div>
  <div class="wn" id="w-n">—</div>
  <div class="wt" id="w-t">EQUIPO —</div>
  <div class="wst" id="w-st">Esperando al admin...</div>
  <div class="wsc">
    <div class="ws"><div class="wsl ea">AZUL</div><div class="wsn ea" id="mob-sa">0</div></div>
    <div class="ws"><div class="wsl eb">ROJO</div><div class="wsn eb" id="mob-sb">0</div></div>
  </div>
</div>

<div class="scr" id="s-duel">
  <div class="dt">⚡ ¡DUELO! ⚡</div>
  <div class="de" id="d-e">ERES EL DUELISTA</div>
  <div class="dn" id="d-n">—</div>
  <div class="dr" id="d-r">—</div>
  <div class="dmj">
    <div class="dmj-l">— MINIJUEGO —</div>
    <div class="dmj-n" id="d-mjn">—</div>
    <div class="dmj-i" id="d-mji">—</div>
  </div>
  <div class="dw" id="d-w">Espera el conteo...</div>
</div>

<div class="scr" id="s-mj">
  <div class="mj-w" id="mj-c"></div>
</div>

<div class="scr" id="s-res">
  <div class="res-i" id="r-i">🏆</div>
  <div class="res-t" id="r-t">—</div>
  <div class="res-s" id="r-s">—</div>
</div>

<script>
// ── FIREBASE ──
const FC={apiKey:"AIzaSyAib6PDnV_u8GuDp-PnJvop91qv9JHfffc",authDomain:"impostor-322cc.firebaseapp.com",databaseURL:"https://impostor-322cc-default-rtdb.europe-west1.firebasedatabase.app",projectId:"impostor-322cc",storageBucket:"impostor-322cc.firebasestorage.app",messagingSenderId:"808449155212",appId:"1:808449155212:web:c32ca0565b083056f31ba9"};
firebase.initializeApp(FC);
const db=firebase.database(), RR=db.ref('retro');

const MJS={
  reflejos:{e:'⚡',n:'REFLEJOS DE ACERO',inst:'¡Pulsa cuando se ponga VERDE! El más rápido gana'},
  click:{e:'🖱️',n:'CLICK LOCO',inst:'El que más veces pulse en 10 segundos gana'},
  dado:{e:'🎲',n:'EL DADO MALDITO',inst:'Tira el dado — el mayor número gana'},
  piedra:{e:'✂️',n:'PIEDRA PAPEL TIJERA',inst:'Elige en secreto — se revela simultáneamente'},
  pregunta:{e:'❓',n:'PREGUNTA RELÁMPAGO',inst:'Responde antes que tu rival — primer acierto gana'},
  memoria:{e:'🧠',n:'MEMORIA FLASH',inst:'Ambos ven la MISMA secuencia — el primero en completarla gana'},
  moneda:{e:'🪙',n:'CARA O CRUZ',inst:'Elige cara o cruz antes del lanzamiento — suerte pura'},
  precio:{e:'💰',n:'ADIVINA EL PRECIO',inst:'¿Cuánto cuesta? El que más se acerque gana'},
};

// ── ESTADO ──
let myName='',myTeam='',myId='',isDuel=false,curMj='',duelA='',duelB='';
// Refs activos de Firebase que hay que limpiar entre rondas
let activeListeners=[];
function cleanListeners(){activeListeners.forEach(([ref,fn])=>ref.off('value',fn));activeListeners=[];}

// ── NAVEGACIÓN ──
function scr(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}

// ── REGISTRO ──
document.getElementById('rname').addEventListener('keydown',e=>{if(e.key==='Enter')registrarse();});
function registrarse(){
  const n=document.getElementById('rname').value.trim();
  if(!n){showErr('Escribe tu nombre');return;}
  const btn=document.getElementById('rbtn');
  btn.textContent='...';btn.disabled=true;
  RR.child('jugadores').once('value').then(snap=>{
    const jugs=snap.val()||{};
    const total=Object.keys(jugs).length;
    myTeam=total%2===0?'A':'B';
    myName=n.toUpperCase();
    const ref=RR.child('jugadores').push();
    myId=ref.key;
    return ref.set({nombre:myName,equipo:myTeam,ts:Date.now()});
  }).then(()=>{mostrarEquipo();initListener();})
  .catch(()=>{showErr('Error de conexión');btn.textContent='UNIRME ▶';btn.disabled=false;});
}
function showErr(m){const e=document.getElementById('rerr');e.textContent=m;setTimeout(()=>e.textContent='',2500);}

function mostrarEquipo(){
  const isA=myTeam==='A';
  document.getElementById('s-eq').className='scr '+(isA?'ea':'eb');
  document.getElementById('eq-esc').textContent=isA?'🔵':'🔴';
  document.getElementById('eq-nm').textContent='EQUIPO '+(isA?'AZUL':'ROJO');
  document.getElementById('eq-nm').className='eq-nm '+(isA?'ea':'eb');
  document.getElementById('eq-desc').textContent=isA?'¡Lucha por el equipo Azul!':'¡Lucha por el equipo Rojo!';
  scr('s-eq');
  setTimeout(()=>irEspera(),2500);
}
function irEspera(){
  const isA=myTeam==='A';
  document.getElementById('w-i').textContent=isA?'🔵':'🔴';
  document.getElementById('w-n').textContent=myName;
  document.getElementById('w-n').className='wn '+(isA?'ea':'eb');
  document.getElementById('w-t').textContent='EQUIPO '+(isA?'AZUL':'ROJO');
  document.getElementById('w-t').className='wt '+(isA?'ea':'eb');
  cleanListeners(); // limpiar listeners de minijuego anterior
  scr('s-wait');
}

// ── LISTENER PRINCIPAL ──
function initListener(){
  RR.on('value',snap=>{
    const d=snap.val();if(!d)return;
    if(d.scoreA!==undefined)document.getElementById('mob-sa').textContent=d.scoreA;
    if(d.scoreB!==undefined)document.getElementById('mob-sb').textContent=d.scoreB;
    if(!d.cmd)return;
    const cmd=d.cmd;
    if(cmd==='lobby'){irEspera();}
    else if(cmd==='duelo'){onDuelo(d);}
    else if(cmd==='conteo'||cmd==='jugando'){
      if(isDuel){scr('s-mj');lanzarMj(curMj);}
      else{document.getElementById('w-st').textContent='Duelo en curso — mira la TV 📺';irEspera();}
    }
    else if(cmd==='ganador'){onGanador(d);}
    else if(cmd==='campeones'){onCampeones(d);}
  });
}

function onDuelo(d){
  cleanListeners();
  curMj=d.minijuego||'reflejos';
  duelA=(d.jugadorA||'').toUpperCase();
  duelB=(d.jugadorB||'').toUpperCase();
  isDuel=(myName===duelA||myName===duelB);
  const mj=MJS[curMj]||MJS.reflejos;
  document.getElementById('d-mjn').textContent=mj.e+' '+mj.n;
  document.getElementById('d-mji').textContent=mj.inst;
  const s=document.getElementById('s-duel');
  if(isDuel){
    const rival=myName===duelA?duelB:duelA;
    s.className='scr '+(myTeam==='A'?'ea':'eb');
    document.getElementById('d-e').textContent='¡TÚ DUELEAS!';
    document.getElementById('d-n').textContent=myName;
    document.getElementById('d-n').className='dn '+(myTeam==='A'?'ea':'eb');
    document.getElementById('d-r').textContent='VS '+rival;
    document.getElementById('d-w').textContent='Espera el conteo...';
  } else {
    s.className='scr obs';
    document.getElementById('d-e').textContent='DUELO EN CURSO';
    document.getElementById('d-n').textContent=duelA+' VS '+duelB;
    document.getElementById('d-n').className='dn';
    document.getElementById('d-r').textContent='';
    document.getElementById('d-w').textContent='Eres espectador — mira la TV 📺';
  }
  scr('s-duel');
}

function onGanador(d){
  const ganEq=d.ganadorEquipo,ganNm=(d.ganadorNombre||'').toUpperCase();
  const yo=ganNm===myName,miEq=ganEq===myTeam;
  document.getElementById('r-i').textContent=yo?'🏆':miEq?'🎉':'😤';
  document.getElementById('r-t').textContent=yo?'¡HAS GANADO!':miEq?'¡TU EQUIPO GANA!':'Han ganado ellos';
  document.getElementById('r-t').className='res-t '+(miEq?'win':'lose');
  document.getElementById('r-s').textContent=ganNm+' · EQ.'+(ganEq==='A'?'AZUL':'ROJO');
  scr('s-res');
  setTimeout(()=>irEspera(),4500);
}
function onCampeones(d){
  cleanListeners();
  const miEq=d.campeonEquipo===myTeam;
  document.getElementById('r-i').textContent=miEq?'🏆':'🎖️';

// SISTEMA CENTRAL DE RESULTADO
// Un solo punto de escritura. Usa una flag en Firebase
// para garantizar que solo el primer resultado cuenta.
// ══════════════════════════════════════════════════

let resultadoEnviado=false; // flag local para no escribir dos veces desde el mismo móvil

function declararGanador(eq,nm){
  if(resultadoEnviado) return;
  resultadoEnviado=true;
  // set con condición: solo escribe si el campo está vacío
  const ref=RR.child('resultadoPendiente');
  ref.once('value').then(snap=>{
    if(snap.val()===null){
      ref.set({ganadorEquipo:eq,ganadorNombre:nm,ts:Date.now()});
    }
    // Si ya había un valor, otro móvil ganó primero — no hacemos nada
  });
}

// ── RESET del flag al iniciar un nuevo minijuego ──
function lanzarMj(id){
  resultadoEnviado=false;
  cleanListeners();
  const c=document.getElementById('mj-c');
  c.innerHTML='';
  const fns={
    reflejos:mjReflejos,click:mjClick,dado:mjDado,
    piedra:mjPiedra,pregunta:mjPregunta,memoria:mjMemoria,
    moneda:mjMoneda,precio:mjPrecio,
  };
  (fns[id]||mjReflejos)(c);
}

// MINIJUEGO 1: REFLEJOS
// Solo los duelistas lo juegan. Secuencia:
// 1) Pantalla ROJA → espera random 2-5s
// 2) Pantalla VERDE → pulsa! El primero gana
// 3) Si pulsas en rojo → penalización, rival gana
// Bug fix: ambos móviles tienen el mismo delay (seed fijo por ronda)
// ══════════════════════════════════════════════════
function mjReflejos(c){
  let fase='espera',done=false;
  // Usamos el timestamp de la ronda como seed para que el delay sea igual en ambos
  RR.child('rondaTs').once('value').then(snap=>{
    const seed=(snap.val()||Date.now())%10000;
    const delay=2000+(seed%3000); // 2000-5000ms, igual para ambos
    c.innerHTML=`
      <div class="mj-l">¡ESPERA... LUEGO PULSA!</div>
      <button id="rb" style="width:min(260px,78vw);height:min(260px,78vw);border-radius:50%;background:rgba(255,51,51,.25);border:5px solid var(--B);color:var(--B);font-family:'Press Start 2P',monospace;font-size:clamp(18px,6vw,28px);cursor:pointer;transition:background .3s,border-color .3s" onclick="rflPulsar()">
        ESPERA...
      </button>
      <div class="mj-res" id="rfl-r" style="min-height:36px"></div>`;
    const btn=document.getElementById('rb');
    const timGreen=setTimeout(()=>{
      if(done)return;
      fase='verde';
      btn.style.background='rgba(57,255,20,.3)';
      btn.style.borderColor='var(--pixel)';
      btn.style.color='var(--pixel)';
      btn.classList.add('flash');
      btn.textContent='¡AHORA!';
    },delay);
    // Timeout si nadie pulsa en 4s tras verde
    const timOut=setTimeout(()=>{
      if(!done&&fase==='verde'){done=true;clearTimeout(timGreen);
        btn.textContent='TIEMPO';btn.style.background='rgba(201,168,76,.2)';
        document.getElementById('rfl-r').textContent='¡Tiempo!';document.getElementById('rfl-r').className='mj-res tie';
        declararGanador(Math.random()>.5?'A':'B',Math.random()>.5?duelA:duelB);
      }
    },delay+4000);
    window._rflTimers=[timGreen,timOut];
    window.rflPulsar=()=>{
      if(done)return;done=true;
      clearTimeout(window._rflTimers[0]);clearTimeout(window._rflTimers[1]);
      if(fase==='espera'){
        btn.classList.remove('flash');btn.style.background='rgba(255,51,51,.3)';
        btn.textContent='⛔';
        document.getElementById('rfl-r').textContent='¡DEMASIADO PRONTO!';
        document.getElementById('rfl-r').className='mj-res lose';
        const rEq=myTeam==='A'?'B':'A',rNm=myTeam==='A'?duelB:duelA;
        declararGanador(rEq,rNm);
      } else {
        btn.classList.remove('flash');btn.style.background='rgba(57,255,20,.4)';
        btn.textContent='✅';
        document.getElementById('rfl-r').textContent='¡PRIMERO!';
        document.getElementById('rfl-r').className='mj-res win';
        declararGanador(myTeam,myName);
      }
    };
  });
}

// MINIJUEGO 2: CLICK LOCO
// Ambos pulsan 10s. Se guardan los clicks en Firebase.
// Bug fix: listener se registra en activeListeners y se limpia
// Bug fix: comparación correcta cuando ambos terminan
// ══════════════════════════════════════════════════
function mjClick(c){
  let count=0,t=10,done=false;
  const slot=myName===duelA?'cA':'cB';
  c.innerHTML=`
    <div class="mj-l">¡EL QUE MÁS PULSE GANA!</div>
    <button id="cb" style="width:min(240px,74vw);height:min(240px,74vw);border-radius:50%;background:rgba(57,255,20,.14);border:5px solid var(--pixel);color:var(--pixel);font-family:'Press Start 2P',monospace;font-size:clamp(20px,6.5vw,32px);cursor:pointer;" onclick="cbPulsar()">0</button>
    <div class="mj-timer" id="ct">10</div>`;
  const btn=document.getElementById('cb');
  const tel=document.getElementById('ct');
  // Limpiar resultados anteriores
  RR.child('clickR').remove();
  const iv=setInterval(()=>{
    t--;tel.textContent=t;
    if(t<=3)tel.style.color='var(--B)';
    if(t<=0){
      clearInterval(iv);done=true;
      btn.style.opacity='.6';btn.textContent=count;
      RR.child('clickR/'+slot).set(count);
    }
  },1000);
  window.cbPulsar=()=>{if(done)return;count++;btn.textContent=count;};
  // Listener con registro para limpieza posterior
  const fn=(snap)=>{
    const r=snap.val();
    if(!r||r.cA===undefined||r.cB===undefined)return;
    const ref=RR.child('clickR');
    ref.off('value',fn);
    // Eliminar del array de activos
    activeListeners=activeListeners.filter(([_r,_f])=>_f!==fn);
    if(r.cA>r.cB) declararGanador('A',duelA);
    else if(r.cB>r.cA) declararGanador('B',duelB);
    else declararGanador(Math.random()>.5?'A':'B',Math.random()>.5?duelA:duelB);
  };
  const ref=RR.child('clickR');
  ref.on('value',fn);
  activeListeners.push([ref,fn]);
}

// MINIJUEGO 6: MEMORIA FLASH
// Bug fix: AMBOS ven la MISMA secuencia (generada con seed de ronda en Firebase)
// El primero en completarla sin fallar gana
// ══════════════════════════════════════════════════
function mjMemoria(c){
  const COLS=['rc','bc','gc','yc'];const EMOJ=['🔴','🔵','🟢','🟡'];
  // Generar secuencia con seed compartido
  RR.child('rondaTs').once('value').then(snap=>{
    const seed=snap.val()||Date.now();
    // Pseudo-random determinista con el seed
    let s=seed;const rng=()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};
    const SEQ=[...Array(5)].map(()=>~~(rng()*4));
    let fase='mostrando',ps=[],failed=false;
    c.innerHTML=`
      <div class="mj-l" id="ml">Observa bien...</div>
      <div class="seq-g">${COLS.map((col,i)=>`<div class="sqb ${col}" id="sq${i}" onclick="seqPulsar(${i})">${EMOJ[i]}</div>`).join('')}</div>
      <div class="seq-prog" id="sp">${SEQ.map(i=>EMOJ[i]).join(' ')}</div>`;
    function ilum(idx,cb){
      const el=document.getElementById('sq'+idx);if(!el)return cb();
      el.classList.add('lit');setTimeout(()=>{el.classList.remove('lit');setTimeout(cb,180);},500);
    }
    function mostrar(i){if(i>=SEQ.length){fase='jugando';document.getElementById('ml').textContent='¡Repítela!';return;}ilum(SEQ[i],()=>mostrar(i+1));}
    setTimeout(()=>mostrar(0),600);
    // Timeout 25s
    const timOut=setTimeout(()=>{
      if(fase==='jugando'&&!failed){failed=true;
        document.getElementById('ml').textContent='⏱️ Tiempo';
        declararGanador(Math.random()>.5?'A':'B',Math.random()>.5?duelA:duelB);
      }
    },25000);
    window.seqPulsar=i=>{
      if(fase!=='jugando'||failed)return;
      const el=document.getElementById('sq'+i);el.classList.add('lit');setTimeout(()=>el.classList.remove('lit'),200);
      ps.push(i);
      if(i!==SEQ[ps.length-1]){
        clearTimeout(timOut);failed=true;
        document.getElementById('ml').textContent='❌ Error — rival puede ganar';
        document.getElementById('ml').style.color='var(--B)';
        const rEq=myTeam==='A'?'B':'A';declararGanador(rEq,myTeam==='A'?duelB:duelA);
      } else if(ps.length===SEQ.length){
        clearTimeout(timOut);
        document.getElementById('ml').textContent='✅ ¡Completada!';
        document.getElementById('ml').style.color='var(--pixel)';
        declararGanador(myTeam,myName);
      } else {
        document.getElementById('sp').textContent=SEQ.slice(ps.length).map(i=>EMOJ[i]).join(' ');
      }
    };
  });
}

function mjMoneda(c){

    </div>
    <div class="moneda" id="m-icon" style="font-size:clamp(70px,22vw,110px);line-height:1">🪙</div>
    <div class="mj-res" id="m-r" style="min-height:28px"></div>`;
  // Timeout 6s para elegir
  const timOut=setTimeout(()=>{
    if(!elegido) monedaElegir(Math.random()>.5?'cara':'cruz');
  },6000);
  window.monedaElegir=elec=>{
    if(elegido)return;
    clearTimeout(timOut);
    elegido=elec;
    document.getElementById('btn-cara').style.opacity=elec==='cara'?'1':'.3';
    document.getElementById('btn-cruz').style.opacity=elec==='cruz'?'1':'.3';
    document.getElementById('m-r').textContent='Elegiste '+elec.toUpperCase()+' — lanzando...';
    const slot=myName===duelA?'mA':'mB';
    RR.child('monedaR/'+slot).set(elec);
    // Animar la moneda
    const mi=document.getElementById('m-icon');
    mi.style.animation='none';void mi.offsetWidth;mi.style.animation='spin3d 1.5s ease-in-out forwards';
  };
  // Cuando ambos elijan → el seed de la ronda decide cara o cruz
  const fn=(snap)=>{
    const r=snap.val();

    const ref=RR.child('monedaR');
    ref.off('value',fn);

    // Resultado determinista con rondaTs
    RR.child('rondaTs').once('value').then(snap2=>{
      ref.remove();
      const resultado=(snap2.val()||Date.now())%2===0?'cara':'cruz';
      const mi=document.getElementById('m-icon');
      mi.textContent=resultado==='cara'?'⭕':'✖️';

      const ganEqA=r.mA===resultado?'A':null;

      let ganEq,ganNm;
      if(ganEqA&&!ganEqB){ganEq='A';ganNm=duelA;}
      else if(ganEqB&&!ganEqA){ganEq='B';ganNm=duelB;}
      else{ganEq=Math.random()>.5?'A':'B';ganNm=ganEq==='A'?duelA:duelB;} // ambos igual o ambos distinto
      document.getElementById('m-r').textContent='Salió '+resultado.toUpperCase()+'! '+(ganEq===myTeam?'¡TU EQUIPO GANA!':'Gana el rival');
      document.getElementById('m-r').className='mj-res '+(ganEq===myTeam?'win':'lose');
      setTimeout(()=>declararGanador(ganEq,ganNm),800);
    });
  };
  const ref=RR.child('monedaR');
  ref.on('value',fn);
  activeListeners.push([ref,fn]);
}

// ══════════════════════════════════════════════════
// MINIJUEGO 8: ADIVINA EL PRECIO — NUEVO
// Aparece un objeto con emoji. Escribe un precio en €.
// El que más se acerque gana. Dramático y divertido.
// ══════════════════════════════════════════════════
const PRECIOS=[
  {e:'🍕',n:'Pizza Margarita (restaurante)',p:12},
  {e:'✈️',n:'Vuelo Madrid→París (Ryanair)',p:45},
  {e:'🎮',n:'PlayStation 5',p:549},
  {e:'👟',n:'Nike Air Force 1',p:110},
  {e:'🍺',n:'Cerveza en bar de Madrid',p:3},
  {e:'🚗',n:'Seat Ibiza nuevo',p:18000},
  {e:'🏠',n:'Apartamento Madrid (alquiler/mes)',p:1200},
  {e:'☕',n:'Café con leche en bar',p:2},
  {e:'📱',n:'iPhone 16',p:999},
  {e:'🎬',n:'Entrada de cine',p:10},
  {e:'🦞',n:'Kilo de langosta',p:65},
  {e:'🎓',n:'Un año de universidad pública',p:1200},
  {e:'💈',n:'Corte de pelo en peluquería',p:18},
  {e:'🥩',n:'Chuletón en asador',p:40},
  {e:'🎢',n:'Entrada Port Aventura',p:58},
];
function mjPrecio(c){
  RR.child('precioR').remove();
  const slot=myName===duelA?'pA':'pB';
  RR.child('rondaTs').once('value').then(snap=>{
    const seed=(snap.val()||Date.now())%PRECIOS.length;
    const item=PRECIOS[~~seed];
    let enviado=false;
    c.innerHTML=`
      <div class="precio-img">${item.e}</div>
      <div class="precio-q">${item.n}</div>
      <div class="mj-l" style="font-size:clamp(12px,4vw,17px);opacity:.5">¿CUÁNTO CUESTA? (€)</div>
      <input type="number" class="precio-input" id="precio-inp" placeholder="0" min="0" max="999999">
      <button class="precio-btn" onclick="precioEnviar()">CONFIRMAR ▶</button>
      <div class="precio-res" id="precio-r"></div>`;
    document.getElementById('precio-inp').focus();
    const timOut=setTimeout(()=>{if(!enviado)precioEnviar();},12000);
    window.precioEnviar=()=>{
      if(enviado)return;
      clearTimeout(timOut);
      enviado=true;
      const val=parseFloat(document.getElementById('precio-inp').value)||0;
      document.getElementById('precio-inp').disabled=true;
      document.querySelector('.precio-btn').disabled=true;
      document.getElementById('precio-r').textContent='Tu respuesta: '+val+'€ — esperando rival...';
      RR.child('precioR/'+slot).set(val);
    };
  });
  const fn=(snap)=>{
    const r=snap.val();
    if(!r||r.pA===undefined||r.pB===undefined)return;
    const ref=RR.child('precioR');
    ref.off('value',fn);
    activeListeners=activeListeners.filter(([_r,_f])=>_f!==fn);
    RR.child('rondaTs').once('value').then(snap2=>{
      ref.remove();
      const seed=(snap2.val()||Date.now())%PRECIOS.length;
      const item=PRECIOS[~~seed];
      const diffA=Math.abs(r.pA-item.p),diffB=Math.abs(r.pB-item.p);
      const res=document.getElementById('precio-r');
      res.textContent=`Precio real: ${item.p}€ · Azul: ${r.pA}€ · Rojo: ${r.pB}€`;
      let ganEq,ganNm;
      if(diffA<=diffB){ganEq='A';ganNm=duelA;}
      else{ganEq='B';ganNm=duelB;}
      setTimeout(()=>{
        res.textContent+=' → '+(ganEq===myTeam?'¡GANA TU EQUIPO!':'Gana el rival');
        res.className='precio-res '+(ganEq===myTeam?'win':'lose');
        declararGanador(ganEq,ganNm);
      },1500);
    });
  };
  const ref=RR.child('precioR');
  ref.on('value',fn);
  activeListeners.push([ref,fn]);
}
</script>
