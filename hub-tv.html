<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRADUACIÓN 2026 — HUB TV</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --dark: #06070f;
  --dark2: #0c0e1a;
  --dark3: #111428;
  --cream: #f0e6cc;
  --cream2: #d4c9a8;
  --blue: #1a2a5e;
  --accent: #7c5cbf;
  --red: #8b1a1a;
  --white: #ffffff;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--dark);
  color: var(--cream);
  font-family: 'Share Tech Mono', monospace;
  height: 100vh;
  overflow: hidden;
  position: relative;
  cursor: none;
}

/* ─── CANVAS FONDO ─── */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ─── OVERLAY SCANLINES ─── */
.scanlines {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

/* ─── PANTALLAS ─── */
.screen {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 10;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.screen.active { display: flex; }

/* ══════════════════════════════════════
   PANTALLA STANDBY
══════════════════════════════════════ */
#screen-standby {
  background: transparent;
}

.standby-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  animation: fadeInUp 2s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(40px); }
  to   { opacity: 1; transform: translateY(0); }
}

.grad-year-wrap {
  position: relative;
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 8px;
}

.grad-line {
  width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold));
}
.grad-line.right {
  background: linear-gradient(90deg, var(--gold), transparent);
}

.grad-year {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(18px, 2vw, 26px);
  letter-spacing: 18px;
  color: var(--gold);
  text-shadow: 0 0 40px rgba(201, 168, 76, 0.6);
  animation: goldPulse 4s ease-in-out infinite;
}
@keyframes goldPulse {
  0%, 100% { text-shadow: 0 0 40px rgba(201,168,76,0.4); }
  50%       { text-shadow: 0 0 80px rgba(201,168,76,0.9), 0 0 120px rgba(201,168,76,0.3); }
}

.standby-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(80px, 11vw, 160px);
  font-weight: 900;
  font-style: italic;
  line-height: 0.88;
  text-align: center;
  color: var(--cream);
  letter-spacing: -2px;
  text-shadow: 0 0 120px rgba(201,168,76,0.15);
  animation: titleBreath 6s ease-in-out infinite;
}
@keyframes titleBreath {
  0%,100% { text-shadow: 0 0 120px rgba(201,168,76,0.15), 0 4px 60px rgba(0,0,0,0.8); }
  50%     { text-shadow: 0 0 180px rgba(201,168,76,0.3), 0 4px 60px rgba(0,0,0,0.8); }
}

.standby-title span {
  color: var(--gold);
  display: block;
}

.standby-sub {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(14px, 1.5vw, 22px);
  letter-spacing: 6px;
  color: rgba(240, 230, 204, 0.4);
  margin-top: 20px;
  text-align: center;
  animation: subFade 3s ease-in-out infinite alternate;
}
@keyframes subFade {
  from { opacity: 0.3; }
  to   { opacity: 0.7; }
}

.standby-ornament {
  margin-top: 32px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.orn-diamond {
  width: 8px; height: 8px;
  background: var(--gold);
  transform: rotate(45deg);
  animation: diamondPulse 2s ease-in-out infinite;
}
@keyframes diamondPulse {
  0%,100% { opacity: 0.4; transform: rotate(45deg) scale(1); }
  50%     { opacity: 1; transform: rotate(45deg) scale(1.3); }
}
.orn-line { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }



/* ══════════════════════════════════════
   PANTALLA RULETA
══════════════════════════════════════ */
#screen-ruleta {
  background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(28,20,60,0.95) 0%, rgba(6,7,15,0.99) 70%);
}

.ruleta-header {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(14px, 1.8vw, 22px);
  letter-spacing: 14px;
  color: rgba(201,168,76,0.5);
  margin-bottom: 20px;
  animation: fadeInDown 0.8s both;
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.ruleta-container {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

#ruleta-canvas {
  border-radius: 50%;
  filter: drop-shadow(0 0 40px rgba(201,168,76,0.3));
  animation: fadeInScale 1s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes fadeInScale {
  from { opacity: 0; transform: scale(0.6); }
  to   { opacity: 1; transform: scale(1); }
}

/* Aguja */
.ruleta-aguja {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 36px solid var(--gold);
  filter: drop-shadow(0 0 8px rgba(201,168,76,0.8));
  z-index: 5;
}

.ruleta-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 8px;
  padding: 16px 64px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--dark);
  border: none;
  cursor: pointer;
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  transition: all 0.2s;
  box-shadow: 0 0 30px rgba(201,168,76,0.4);
}
.ruleta-btn:hover { transform: scale(1.04); box-shadow: 0 0 50px rgba(201,168,76,0.7); }
.ruleta-btn:active { transform: scale(0.97); }
.ruleta-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ══════════════════════════════════════
   PANTALLA INSTRUCCIONES JUEGO
══════════════════════════════════════ */
#screen-instrucciones {
  background: var(--dark2);
}

.instr-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  max-width: 900px;
  width: 100%;
  padding: 40px;
  animation: fadeInUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
}

.instr-tag {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: 10px;
  color: rgba(201,168,76,0.4);
}

.instr-emoji {
  font-size: 72px;
  line-height: 1;
  animation: emojiPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both 0.2s;
}
@keyframes emojiPop {
  from { opacity: 0; transform: scale(0.3) rotate(-10deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}

.instr-titulo {
  font-family: 'Playfair Display', serif;
  font-size: clamp(42px, 6vw, 88px);
  font-weight: 900;
  font-style: italic;
  color: var(--cream);
  text-align: center;
  line-height: 0.9;
  animation: fadeInUp 0.6s both 0.3s;
}
.instr-titulo .gold { color: var(--gold); }

.instr-tema {
  font-size: 12px;
  letter-spacing: 5px;
  color: rgba(201,168,76,0.4);
  text-transform: uppercase;
  animation: fadeInUp 0.6s both 0.35s;
}

.instr-separator {
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
  animation: fadeInUp 0.6s both 0.4s;
}

.instr-desc {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(15px, 1.6vw, 20px);
  color: rgba(240,230,204,0.7);
  text-align: center;
  max-width: 700px;
  line-height: 1.7;
  animation: fadeInUp 0.6s both 0.45s;
}

.instr-pasos {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeInUp 0.6s both 0.5s;
}

.instr-paso {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: rgba(201,168,76,0.05);
  border: 1px solid rgba(201,168,76,0.15);
  padding: 14px 18px;
  max-width: 260px;
  flex: 1;
  min-width: 200px;
}
.paso-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: rgba(201,168,76,0.3);
  line-height: 1;
  flex-shrink: 0;
}
.paso-txt {
  font-size: 13px;
  color: rgba(240,230,204,0.65);
  line-height: 1.6;
}

.instr-tv-badge {
  display: flex;
  gap: 10px;
  animation: fadeInUp 0.6s both 0.55s;
}
.tv-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  padding: 6px 14px;
  border: 1px solid rgba(201,168,76,0.25);
  color: rgba(201,168,76,0.5);
}

.instr-countdown {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 6px;
  color: rgba(201,168,76,0.4);
  animation: fadeInUp 0.6s both 0.6s;
}
#instr-timer-bar {
  width: 400px;
  height: 3px;
  background: rgba(201,168,76,0.1);
  position: relative;
  overflow: hidden;
}
#instr-timer-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  transition: width 1s linear;
}

/* ══════════════════════════════════════
   PANTALLA CLASIFICACIÓN
══════════════════════════════════════ */
#screen-ranking {
  background: var(--dark2);
}

.ranking-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 800px;
  padding: 40px;
  animation: fadeInUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
}

.ranking-titulo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(40px, 6vw, 80px);
  letter-spacing: 10px;
  color: var(--cream);
}
.ranking-titulo .gold { color: var(--gold); }

.ranking-list {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.ranking-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(201,168,76,0.08);
  animation: slideInLeft 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  transition: all 0.3s;
}
.ranking-item:nth-child(1) { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.06); }
.ranking-item:nth-child(2) { border-color: rgba(192,192,192,0.3); }
.ranking-item:nth-child(3) { border-color: rgba(205,127,50,0.3); }

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-40px); }
  to   { opacity: 1; transform: translateX(0); }
}

.rank-pos {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  width: 48px;
  text-align: center;
  color: rgba(201,168,76,0.3);
}
.ranking-item:nth-child(1) .rank-pos { color: var(--gold); font-size: 42px; }
.rank-nombre {
  font-family: 'Playfair Display', serif;
  font-size: clamp(18px, 2.2vw, 28px);
  font-weight: 700;
  flex: 1;
}
.rank-puntos {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: var(--gold);
  letter-spacing: 2px;
}
.rank-bar-wrap {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: rgba(201,168,76,0.05);
}
.rank-bar { height: 100%; background: var(--gold); transition: width 1.5s cubic-bezier(0.16,1,0.3,1); }

/* ══════════════════════════════════════
   TRANSICIÓN JUEGO LANZADO
══════════════════════════════════════ */
#screen-launch {
  background: var(--dark);
  z-index: 100;
}
.launch-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
.launch-emoji { font-size: 100px; animation: launchBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes launchBounce {
  from { opacity: 0; transform: scale(0) rotate(-20deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}
.launch-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(50px, 8vw, 110px);
  font-weight: 900;
  font-style: italic;
  color: var(--gold);
  text-align: center;
  animation: fadeInUp 0.5s both 0.2s;
  text-shadow: 0 0 60px rgba(201,168,76,0.5);
}
.launch-sub {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(16px, 2vw, 24px);
  letter-spacing: 10px;
  color: rgba(201,168,76,0.5);
  animation: fadeInUp 0.5s both 0.4s;
}
.launch-bar {
  width: 400px;
  height: 4px;
  background: rgba(201,168,76,0.15);
  overflow: hidden;
  margin-top: 10px;
}
.launch-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  animation: fillBar 3s linear both 0.5s;
}
@keyframes fillBar {
  from { width: 0; }
  to   { width: 100%; }
}

/* ── GLITCH text effect ── */
.glitch {
  position: relative;
}
.glitch::before, .glitch::after {
  content: attr(data-text);
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.glitch::before {
  color: #0ff;
  animation: glitch1 3s infinite;
  clip-path: inset(0 0 60% 0);
}
.glitch::after {
  color: #f0f;
  animation: glitch2 3s infinite;
  clip-path: inset(60% 0 0 0);
}
@keyframes glitch1 {
  0%,90%,100% { transform: translate(0); opacity: 0; }
  92% { transform: translate(-3px, 1px); opacity: 0.7; }
  94% { transform: translate(3px, -1px); opacity: 0.7; }
  96% { transform: translate(0); opacity: 0; }
}
@keyframes glitch2 {
  0%,90%,100% { transform: translate(0); opacity: 0; }
  93% { transform: translate(3px, 2px); opacity: 0.6; }
  95% { transform: translate(-3px, -2px); opacity: 0.6; }
  97% { transform: translate(0); opacity: 0; }
}

/* ── Corner decorations ── */
.corner {
  position: fixed;
  width: 60px;
  height: 60px;
  z-index: 50;
  pointer-events: none;
}
.corner-tl { top: 20px; left: 20px; border-top: 1px solid rgba(201,168,76,0.3); border-left: 1px solid rgba(201,168,76,0.3); }
.corner-tr { top: 20px; right: 20px; border-top: 1px solid rgba(201,168,76,0.3); border-right: 1px solid rgba(201,168,76,0.3); }
.corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid rgba(201,168,76,0.3); border-left: 1px solid rgba(201,168,76,0.3); }
.corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid rgba(201,168,76,0.3); border-right: 1px solid rgba(201,168,76,0.3); }

/* ── Status bar top ── */
.status-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  z-index: 50;
  border-bottom: 1px solid rgba(201,168,76,0.08);
  background: rgba(6,7,15,0.4);
  backdrop-filter: blur(8px);
}
.status-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 6px;
  color: rgba(201,168,76,0.3);
}
.status-time {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: rgba(201,168,76,0.3);
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #00c853;
  box-shadow: 0 0 8px #00c853;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>

// ─── PARTICLES BACKGROUND ───
const bgCanvas = document.getElementById('bg-canvas');
const ctx = bgCanvas.getContext('2d');
let particles = [];

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

function createParticle() {
  return {
    x: Math.random() * bgCanvas.width,
    y: Math.random() * bgCanvas.height,
    size: Math.random() * 1.5 + 0.3,
    speedY: -(Math.random() * 0.4 + 0.1),
    speedX: (Math.random() - 0.5) * 0.15,
    opacity: Math.random() * 0.6 + 0.1,
    life: Math.random()
  };
}

for (let i = 0; i < 180; i++) particles.push(createParticle());

// Fireflies for exterior feel
let fireflies = Array.from({length: 12}, () => ({
  x: Math.random() * bgCanvas.width,
  y: Math.random() * bgCanvas.height * 0.8 + bgCanvas.height * 0.1,
  r: Math.random() * 3 + 1,
  phase: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.01 + 0.005,
  moveX: (Math.random() - 0.5) * 0.5,
  moveY: (Math.random() - 0.5) * 0.3
}));

function drawBg() {
  ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

  // Stars / dust
  particles.forEach((p, i) => {
    p.life += 0.003;
    p.x += p.speedX;
    p.y += p.speedY;
    p.opacity = Math.sin(p.life * Math.PI) * 0.6;

    if (p.y < -5 || p.opacity <= 0) {
      particles[i] = createParticle();
      particles[i].y = bgCanvas.height + 5;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201,168,76,${p.opacity})`;
    ctx.fill();
  });

  // Fireflies
  const t = Date.now() * 0.001;
  fireflies.forEach(f => {
    f.phase += f.speed;
    f.x += f.moveX + Math.sin(f.phase * 0.7) * 0.3;
    f.y += f.moveY + Math.cos(f.phase * 0.5) * 0.2;
    if (f.x < 0) f.x = bgCanvas.width;
    if (f.x > bgCanvas.width) f.x = 0;
    if (f.y < 0 || f.y > bgCanvas.height) f.moveY *= -1;

    const glow = (Math.sin(f.phase * 3) + 1) / 2;
    const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 4);
    grad.addColorStop(0, `rgba(201,240,100,${0.7 * glow})`);
    grad.addColorStop(1, 'rgba(201,240,100,0)');
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r * 4, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  });

  requestAnimationFrame(drawBg);
}
drawBg();

// ─── RULETA ───
const ruletaCanvas = document.getElementById('ruleta-canvas');
const rCtx = ruletaCanvas.getContext('2d');
const NUM_JUEGOS = JUEGOS.length;
const ARC = (Math.PI * 2) / NUM_JUEGOS;

const RULETA_COLORS = [
  '#1a1a4e','#1a0d00','#001a0d','#1a001a','#001a1a',
  '#1a0a00','#0d001a','#001a0d','#1a1000','#001a1a'
];
const RULETA_ACCENT = [
  '#7c5cbf','#cc1111','#00c853','#c9a84c','#e05050',
  '#4a90e2','#ff69b4','#ff8c42','#d4a017','#00ff88'
];

let ruletaAngle = 0;
let spinning = false;
let selectedIndex = -1;

function drawRuleta(angle) {
  const cx = ruletaCanvas.width / 2;
  const cy = ruletaCanvas.height / 2;
  const R = cx - 10;

  rCtx.clearRect(0, 0, ruletaCanvas.width, ruletaCanvas.height);

  // Outer ring glow
  const outerGrad = rCtx.createRadialGradient(cx, cy, R-2, cx, cy, R+2);
  outerGrad.addColorStop(0, 'rgba(201,168,76,0.6)');
  outerGrad.addColorStop(1, 'rgba(201,168,76,0)');
  rCtx.beginPath();
  rCtx.arc(cx, cy, R+1, 0, Math.PI*2);
  rCtx.strokeStyle = outerGrad;
  rCtx.lineWidth = 3;
  rCtx.stroke();

  JUEGOS.forEach((j, i) => {
    const startAngle = angle + i * ARC;
    const endAngle = startAngle + ARC;
    const isSelected = i === selectedIndex && !spinning;

    // Sector
    rCtx.beginPath();
    rCtx.moveTo(cx, cy);
    rCtx.arc(cx, cy, R, startAngle, endAngle);
    rCtx.closePath();

    const grad = rCtx.createRadialGradient(cx, cy, 0, cx, cy, R);
    grad.addColorStop(0, RULETA_COLORS[i % RULETA_COLORS.length]);
    grad.addColorStop(1, isSelected ? RULETA_ACCENT[i % RULETA_ACCENT.length] + '88' : RULETA_COLORS[i % RULETA_COLORS.length] + 'cc');
    rCtx.fillStyle = grad;
    rCtx.fill();

    // Sector border
    rCtx.beginPath();
    rCtx.moveTo(cx, cy);
    rCtx.arc(cx, cy, R, startAngle, endAngle);
    rCtx.closePath();
    rCtx.strokeStyle = isSelected ? RULETA_ACCENT[i % RULETA_ACCENT.length] : 'rgba(201,168,76,0.2)';
    rCtx.lineWidth = isSelected ? 2 : 0.5;
    rCtx.stroke();

    // Text
    rCtx.save();
    rCtx.translate(cx, cy);
    rCtx.rotate(startAngle + ARC / 2);
    rCtx.textAlign = 'right';
    rCtx.fillStyle = isSelected ? '#fff' : 'rgba(240,230,204,0.8)';
    rCtx.font = `bold 13px "Bebas Neue", sans-serif`;
    rCtx.letterSpacing = '2px';
    rCtx.fillText(j.emoji + ' ' + j.nombre.toUpperCase(), R - 12, 5);
    rCtx.restore();
  });

  // Center circle
  rCtx.beginPath();
  rCtx.arc(cx, cy, 22, 0, Math.PI*2);
  rCtx.fillStyle = '#06070f';
  rCtx.fill();
  rCtx.strokeStyle = 'rgba(201,168,76,0.5)';
  rCtx.lineWidth = 1.5;
  rCtx.stroke();

  // Center star
  rCtx.fillStyle = 'rgba(201,168,76,0.6)';
  rCtx.font = '18px serif';
  rCtx.textAlign = 'center';
  rCtx.textBaseline = 'middle';
  rCtx.fillText('✦', cx, cy);
}

drawRuleta(ruletaAngle);

document.getElementById('btn-girar').addEventListener('click', () => {
  if (spinning) return;
  spinning = true;
  selectedIndex = -1;
  document.getElementById('btn-girar').disabled = true;

  playSound('spin');

  const extraSpins = (Math.floor(Math.random() * 5) + 8) * Math.PI * 2;
  const targetAngle = ruletaAngle + extraSpins;
  const duration = 4500;
  const start = performance.now();
  const startAngle = ruletaAngle;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animate(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    ruletaAngle = startAngle + extraSpins * easeOut(t);
    drawRuleta(ruletaAngle);

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      ruletaAngle = targetAngle % (Math.PI * 2);
      spinning = false;

      // Calcular cuál apunta la aguja (arriba = -PI/2)
      const normalizedAngle = (((-Math.PI / 2) - ruletaAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      selectedIndex = Math.floor(normalizedAngle / ARC) % NUM_JUEGOS;

      drawRuleta(ruletaAngle);
      playSound('ding');

      setTimeout(() => {
        mostrarInstrucciones(selectedIndex);
      }, 800);

      document.getElementById('btn-girar').disabled = false;
    }
  }
  requestAnimationFrame(animate);
});

function renderRanking(data) {
  const sorted = Object.entries(data)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10);

  const maxPts = sorted[0] ? sorted[0][1] : 1;
  const medals = ['🥇','🥈','🥉'];

  const list = document.getElementById('ranking-list');
  list.innerHTML = sorted.map(([nombre, pts], i) => `
    <div class="ranking-item" style="animation-delay:${i*0.08}s; position:relative;">
      <div class="rank-pos">${medals[i] || (i+1)}</div>
      <div class="rank-nombre">${nombre}</div>
      <div class="rank-puntos">${pts} <span style="font-size:14px;color:rgba(201,168,76,0.4)">pts</span></div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pts/maxPts*100}%"></div></div>
    </div>
  `).join('');
}

// ─── AUDIO ───
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudioCtx();
    const g = ctx.createGain();
    g.connect(ctx.destination);

    if (type === 'spin') {
      // Drum roll feel
      for (let i = 0; i < 12; i++) {
        const o = ctx.createOscillator();
        o.connect(g);
        o.frequency.value = 80 + i * 20;
        g.gain.setValueAtTime(0.05, ctx.currentTime + i * 0.08);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.07);
        o.start(ctx.currentTime + i * 0.08);
        o.stop(ctx.currentTime + i * 0.08 + 0.1);
      }
    } else if (type === 'ding') {
      const o = ctx.createOscillator();
      o.connect(g);
      o.type = 'sine';
      o.frequency.setValueAtTime(880, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.5);
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.9);
    } else if (type === 'launch') {
      // Fanfare
      [523, 659, 784, 1047].forEach((f, i) => {
        const o = ctx.createOscillator();
        o.connect(g);
        o.type = 'square';
        o.frequency.value = f;
        g.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
        g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i * 0.12 + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
        o.start(ctx.currentTime + i * 0.12);
        o.stop(ctx.currentTime + i * 0.12 + 0.35);
      });
    }
  } catch(e) {}
}

// ─── NAVEGACIÓN ───
function mostrarPantalla(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── FIREBASE LISTENER (comandos del admin) ───
hubRef.on('value', snap => {
  const data = snap.val();
  if (!data) return;

  if (data.comando) {
    switch(data.comando) {
      case 'ruleta':
        mostrarPantalla('screen-ruleta');
        document.getElementById('status-label').textContent = 'RULETA';
        break;
      case 'standby':
        mostrarPantalla('screen-standby');
        document.getElementById('status-label').textContent = 'EN ESPERA';
        break;
      case 'ranking':
        mostrarPantalla('screen-ranking');
        document.getElementById('status-label').textContent = 'CLASIFICACIÓN';
        break;
      case 'lanzar':
        if (data.juegoIndex !== undefined) {
          mostrarInstrucciones(data.juegoIndex);
        }
        break;
    }
    // Limpiar comando
    hubRef.update({ comando: null });
  }

  if (data.ranking) {
    rankingData = data.ranking;
    renderRanking(rankingData);
  }
});
