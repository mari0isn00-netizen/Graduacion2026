<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SEÑAL G – TV</title>

  <!-- TIPOGRAFÍAS -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Courier+Prime:wght@400;700&display=swap"
        rel="stylesheet">

  <!-- ESTILO SCRAPBOOK (ruta absoluta) -->
  <link rel="stylesheet" href="/Graduacion2026/assets/css/scrapbook.css">

  <!-- SOCKET.IO (CDN) -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <!-- LÓGICA DE LA TV (ruta absoluta) -->
  <script src="/Graduacion2026/assets/js/tv.js" defer></script>
</head>

<body class="tv">
  <div class="container">

    <!-- ==== BAR ON AIR ==== -->
    <header class="header">
      <h1>🎬 SEÑAL G</h1>
      <p class="subtitle">Programa de TV – 🎓 Graduación</p>
    </header>

    <!-- ==== TICKER ==== -->
    <div class="ticker"><span id="ticker-text"></span></div>

    <main class="content">

      <!-- ==== QR SECTION (dentro de papel) ==== -->
      <section class="paper qr-section">
        <h2>Escanea y únete</h2>
        <div class="qr-wrapper" id="qr-wrapper">
          <div class="qr-placeholder">Cargando QR…</div>
        </div>
        <p class="hint">Apunta la cámara del móvil a este código y escribe tu nombre.</p>
      </section>

      <!-- ==== LISTA DE PARTICIPANTES ==== -->
      <section class="paper players-section">
        <h2>Participantes (<span id="players-count">0</span>)</h2>
        <ul id="players-list" class="players-list"></ul>
      </section>

      <!-- ==== PUNTUACIÓN GLOBAL ==== -->
      <section class="paper scoreboard-section">
        <h2>Puntuación Global</h2>
        <table id="global-scoreboard" class="scoreboard">
          <thead><tr><th>Jugador</th><th>Puntos</th></tr></thead>
          <tbody></tbody>
        </table>
        <p id="game-phase" class="phase-indicator">Fase: <span>Lobby</span></p>
      </section>

    </main>

    <footer class="footer">
      <p>📺 Señal G – Hecho a mano, con 🎞️ y ❤️</p>
    </footer>
  </div>
</body>
</html>
